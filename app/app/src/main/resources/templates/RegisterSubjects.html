<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Register Subjects</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/RegisterSubjects.css}" />
    <link rel="stylesheet" th:href="@{/css/StatsAndCalender.css}"/>
    <link rel="stylesheet" th:href="@{/css/MenuBar.css}" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body>
    <div th:replace="fragments/MenuBar :: header"></div>

    <div class="main-container">
        <div class="left-panel">
            <div class="player-stats-wrapper">
                <div class="player-stats-container">
                    <!-- Money -->
                    <div class="stat money">
                        <label>Money</label>
                        <span class="money-value">$0</span>
                    </div>

                    <!-- Energy -->
                    <div class="stat energy">
                        <label>Energy</label>
                        <div class="bar">
                            <div class="fill energy-fill">0/0</div>
                        </div>
                    </div>

                    <!-- Stress -->
                    <div class="stat stress">
                        <label>Stress</label>
                        <div class="bar">
                            <div class="fill stress-fill">0/0</div>
                        </div>
                    </div>

                    <hr class="divider" />

                    <!-- GPA -->
                    <div class="stat gpa">
                        <p class="credits">Number of Credits: N/A</p>
                        <p class="gpa-value">Grade Point Average: N/A</p>
                    </div>

                    <button class="view-details">View Details</butto>
                </div>
            </div>

            <div class="calendar-wrapper">
                <div class="calendar-container">
                    <div class="calendar-header">
                        <button id="prev-month" class="nav-btn">‹</button>
                        <span id="month-name">Month</span>
                        <span id="year">Year</span>
                        <button id="next-month" class="nav-btn">›</button>
                    </div>
                    <div class="calendar-grid" id="calendar-grid">
                        <div class="day-label">Mon</div>
                        <div class="day-label">Tue</div>
                        <div class="day-label">Wed</div>
                        <div class="day-label">Thu</div>
                        <div class="day-label">Fri</div>
                        <div class="day-label">Sat</div>
                        <div class="day-label">Sun</div>
                    </div>
                </div>
            </div>
        </div>    

        <div class="right-panel">
            <input class="search-bar" placeholder="Search for courses" oninput="filterCourses(this.value)" />

            <div class="subjects-section" id="subjects-section" th:data-userid="${#authentication.principal.userId}">
                
            </div>
        </div>
    </div>

    <div id="course-popup" class="course-popup"></div>
</body>

<script th:inline="javascript">
    let stats = [];
    let stompClient = null;
    const currentUserId = 0;

    async function loadPlayerStats() {
      try {
        const response = await fetch("/player/api/stats/getByUser/[[${#authentication.principal.userId}]]");
        if (!response.ok) throw new Error("API error");

        const stats = await response.json();
        updateUI(stats);
      } catch (error) {
        console.error("Error loading stats:", error);
      }
    }

    function updateUI(stats) {
      // Money
      document.querySelector('.money-value').innerText = `$${Number(stats.money).toLocaleString()}`;

      // Energy
      const energyPercent = (stats.currentEnergy / stats.maxEnergy) * 100;
      const energyFill = document.querySelector('.energy-fill');
      energyFill.style.width = `${energyPercent}%`;
      energyFill.innerText = `${stats.currentEnergy}/${stats.maxEnergy}`;

      // Stress
      const stressPercent = (stats.currentStress / stats.maxStress) * 100;
      const stressFill = document.querySelector('.stress-fill');
      stressFill.style.width = `${stressPercent}%`;
      stressFill.innerText = `${stats.currentStress}/${stats.maxStress}`;
    }

    window.addEventListener("DOMContentLoaded", () => {
      loadPlayerStats();
    });

    const monthNameEl = document.getElementById("month-name");
    const yearEl = document.getElementById("year");
    const calendarGrid = document.getElementById("calendar-grid");

    const monthNames = [
      "January", "February", "March", "April", "May", "June",
      "July", "August", "September", "October", "November", "December"
    ];

    let currentDate = new Date();

    function renderCalendar(date) {
      const year = date.getFullYear();
      const month = date.getMonth();

      monthNameEl.textContent = monthNames[month];
      yearEl.textContent = year;

      while (calendarGrid.children.length > 7) {
        calendarGrid.removeChild(calendarGrid.lastChild);
      }

      const firstDay = new Date(year, month, 1).getDay(); 
      const startDay = (firstDay + 6) % 7; 
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      for (let i = 0; i < startDay; i++) {
        const emptyDiv = document.createElement("div");
        calendarGrid.appendChild(emptyDiv);
      }

      const today = new Date();
      const isCurrentMonth = today.getFullYear() === year && today.getMonth() === month;

      for (let day = 1; day <= daysInMonth; day++) {
        const dayDiv = document.createElement("div");
        dayDiv.className = "day";
        dayDiv.textContent = day;

        if (isCurrentMonth && day === today.getDate()) {
          dayDiv.classList.add("today");
        }

        calendarGrid.appendChild(dayDiv);
      }
    }

    document.getElementById("prev-month").addEventListener("click", () => {
      currentDate.setMonth(currentDate.getMonth() - 1);
      renderCalendar(currentDate);
    });

    document.getElementById("next-month").addEventListener("click", () => {
      currentDate.setMonth(currentDate.getMonth() + 1);
      renderCalendar(currentDate);
    });

    renderCalendar(currentDate);
  </script>

<script>
    async function loadCourses() {
        try {
        const res = await fetch("/player/api/course/list/[[${#authentication.principal.userId}]]");
        const data = await res.json();
        renderCourses(data);
        } catch (err) {
        console.error("Failed to load courses", err);
        }
    }

    function renderCourses(data) {
        const container = document.getElementById("subjects-section");
        container.innerHTML = "";

        // Render category
        renderCategory(container, "In Progress", data.inProgress, "in-progress");
        renderCategory(container, "Not Enrolled", data.notEnrolled, "not-enrolled");
        renderCategory(container, "Completed", data.completed, "completed");
    }

    function renderCategory(container, title, courses, cssClass) {
        const categoryEl = document.createElement("div");
        categoryEl.classList.add("course-category");

        const titleEl = document.createElement("h3");
        titleEl.textContent = title;
        categoryEl.appendChild(titleEl);

        const listEl = document.createElement("div");
        listEl.classList.add("course-list");

        courses.forEach(course => {
            const card = document.createElement("div");
            card.classList.add("course-card", cssClass);

            if (cssClass === "not-enrolled") {
                card.dataset.subjectId = course.subject_id;
                card.dataset.name = course.name;
                card.dataset.credit = course.credit;
                card.dataset.lessons = JSON.stringify(course.lessons.map(l => l.lessonId));
                card.dataset.student = course.student || 0;
            }

            const image = document.createElement("div");
            image.classList.add("card-image");
            image.style.backgroundImage = `url(${course.image || '/images/DefaultAvatar.png'})`;

            const info = document.createElement("div");
            info.classList.add("card-info");

            const topInfo = document.createElement("div");
            const h4 = document.createElement("p");
            h4.classList.add("card-title");
            h4.textContent = course.name;

            const detail = document.createElement("p");
            detail.classList.add("card-detail");

            if (cssClass === "in-progress") {
                detail.textContent = `${course.progress || 0}% Completed`;
            } else if (cssClass === "not-enrolled") {
                detail.textContent = `Students: ${course.student || 0}`;
            } else if (cssClass === "completed") {
                detail.textContent = `${course.score}/100`;

                const dot = document.createElement("span");
                dot.classList.add("score-dot");

                if (course.score >= 85) {
                    dot.style.backgroundColor = "green";
                } else if (course.score >= 70) {
                    dot.style.backgroundColor = "blue";
                } else if (course.score >= 50) {
                    dot.style.backgroundColor = "gold";
                } else {
                    dot.style.backgroundColor = "red";
                }

                detail.appendChild(dot);
            }

            topInfo.appendChild(h4);
            topInfo.appendChild(detail);

            const footer = document.createElement("div");
            footer.classList.add("card-footer");

            const creditsEl = document.createElement("span");
            creditsEl.textContent = `${course.credit} Credits`;

            const lessonsEl = document.createElement("span");
            lessonsEl.textContent = `${course.lessons.length} Lessons`;

            footer.appendChild(creditsEl);
            footer.appendChild(lessonsEl);

            info.appendChild(topInfo);
            info.appendChild(footer);

            card.appendChild(image);
            card.appendChild(info);

            listEl.appendChild(card);
        });

        categoryEl.appendChild(listEl);
        container.appendChild(categoryEl);
    }

    function filterCourses(query) {
        query = query.toLowerCase().trim();
        document.querySelectorAll(".course-card").forEach(card => {
            const title = card.querySelector(".card-title").textContent.toLowerCase();
            if (title.includes(query)) {
                card.style.display = ""; 
            } else {
                card.style.display = "none";
            }
        });
    }

    
    loadCourses();
</script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const popup = document.getElementById("course-popup");

  document.addEventListener("mouseover", (e) => {
    const card = e.target.closest(".course-card.not-enrolled");
    if (card) {
      popup.innerHTML = `
        <h4>${card.dataset.name}</h4>
        <p><strong>Credits:</strong> ${card.dataset.credit}</p>
        <p><strong>Lessons:</strong> ${card.dataset.lessons}</p>
        <p><strong>Students:</strong> ${card.dataset.student}</p>
        <button id="popup-register-btn">Register</button>
      `;
      popup.style.display = "block";

        const rect = card.getBoundingClientRect();
        const screenWidth = window.innerWidth;

        if (rect.left > screenWidth * 0.7) {
        popup.style.top = window.scrollY + rect.top + "px";
        popup.style.left = window.scrollX + rect.left - popup.offsetWidth - 10 + "px";
        } else {
        popup.style.top = window.scrollY + rect.top + "px";
        popup.style.left = window.scrollX + rect.right + 10 + "px";
        }

      const btn = document.getElementById("popup-register-btn");
      const userId = document.getElementById("subjects-section").dataset.userid;
      btn.addEventListener("click", () => {
        registerCourse(card.dataset.subjectId, card.dataset.name, userId,card);

      });
    }
  });

  document.addEventListener("mouseout", (e) => {
    const card = e.target.closest(".course-card.not-enrolled");
    if (card) {
      setTimeout(() => {
        if (!popup.matches(":hover") && !card.matches(":hover")) {
          popup.style.display = "none";
        }
      }, 200);
    }
  });

  popup.addEventListener("mouseleave", () => {
    popup.style.display = "none";
  });
});

async function registerCourse(courseId, courseName, userId, card) {
  alert("📚 Registering course: " + courseName);

  try {
    const payload  = {
      lessons: JSON.parse(card.dataset.lessons || "[]")
    }
    const res = await fetch(`/player/api/course/register/${userId}/${courseId}`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(payload)
    });

    if (!res.ok) {
      throw new Error("Failed to register course");
    }

    const msg = await res.text();
    alert("✅ " + msg);

    document.getElementById("course-popup").style.display = "none";

    loadCourses();
  } catch (err) {
    console.error("Error:", err);
    alert("❌ Could not register course");
  }
}

</script>

</html>
