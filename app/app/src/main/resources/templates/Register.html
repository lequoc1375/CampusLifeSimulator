<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Register - Campus Life Simulator</title>
    <link rel="stylesheet" th:href="@{/css/register.css}" />
  </head>
  <body>
    <div class="background-title">Campus Life Simulator</div>

    <div class="register-container">
      <h2>Register Account</h2>
      <form th:action="@{/register}" method="post" th:object="${registerDTOrq}">
        <input
          type="text"
          th:field="*{username}"
          placeholder="Username"
          required
        />
        <input type="email" th:field="*{email}" placeholder="Email" required />
        <input
          type="password"
          th:field="*{password}"
          placeholder="Password"
          required
        />
        <input
          type="password"
          th:field="*{confirmPassword}"
          placeholder="Confirm Password"
          required
        />
        <button type="submit">Register</button>
      </form>

      <div class="link">
        Already have an account? <a th:href="@{/login}">Login here</a>
      </div>
    </div>
  </body>
</html>
