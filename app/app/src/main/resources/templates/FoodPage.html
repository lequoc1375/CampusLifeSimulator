<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Register Subjects</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/FoodPage.css}" />
    <link rel="stylesheet" th:href="@{/css/StatsAndCalender.css}"/>
    <link rel="stylesheet" th:href="@{/css/MenuBar.css}" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body>
    <div th:replace="fragments/MenuBar :: header"></div>

    <div class="main-container">
        <div class="left-panel">
            <div class="player-stats-wrapper">
                <div class="player-stats-container">
                    <!-- Money -->
                    <div class="stat money">
                        <label>Money</label>
                        <span class="money-value">$0</span>
                    </div>

                    <!-- Energy -->
                    <div class="stat energy">
                        <label>Energy</label>
                        <div class="bar">
                            <div class="fill energy-fill">0/0</div>
                        </div>
                    </div>

                    <!-- Stress -->
                    <div class="stat stress">
                        <label>Stress</label>
                        <div class="bar">
                            <div class="fill stress-fill">0/0</div>
                        </div>
                    </div>

                    <hr class="divider" />

                    <!-- GPA -->
                    <div class="stat gpa">
                        <p class="credits">Number of Credits: N/A</p>
                        <p class="gpa-value">Grade Point Average: N/A</p>
                    </div>

                    <button class="view-details">View Details</butto>
                </div>
            </div>

            <div class="calendar-wrapper">
                <div class="calendar-container">
                    <div class="calendar-header">
                        <button id="prev-month" class="nav-btn">‹</button>
                        <span id="month-name">Month</span>
                        <span id="year">Year</span>
                        <button id="next-month" class="nav-btn">›</button>
                    </div>
                    <div class="calendar-grid" id="calendar-grid">
                        <div class="day-label">Mon</div>
                        <div class="day-label">Tue</div>
                        <div class="day-label">Wed</div>
                        <div class="day-label">Thu</div>
                        <div class="day-label">Fri</div>
                        <div class="day-label">Sat</div>
                        <div class="day-label">Sun</div>
                    </div>
                </div>
            </div>
        </div>    

        <div class="right-panel">
            <div class="foodcourt-container">
                <h2 class="title">STUDENT FOOD COURT</h2>

                <div class="tabs" id="food-tabs">
                    <button class="tab active" data-type="meal">Meal</button>
                    <button class="tab" data-type="drink">Drink</button>
                    <button class="tab" data-type="dessert">Dessert</button>
                </div>

                <div class="tab-content">
                    <div class="food-grid" id="food-items"></div>
                </div>
            </div>
        </div>
    </div>
</body>

<script th:inline="javascript">
    let stats = [];
    let stompClient = null;
    const currentUserId = 0;

    async function loadPlayerStats() {
      try {
        const response = await fetch("/player/api/stats/getByUser/[[${#authentication.principal.userId}]]");
        if (!response.ok) throw new Error("API error");

        const stats = await response.json();
        updateUI(stats);
      } catch (error) {
        console.error("Error loading stats:", error);
      }
    }

    function updateUI(stats) {
      // Money
      document.querySelector('.money-value').innerText = `$${Number(stats.money).toLocaleString()}`;

      // Energy
      const energyPercent = (stats.currentEnergy / stats.maxEnergy) * 100;
      const energyFill = document.querySelector('.energy-fill');
      energyFill.style.width = `${energyPercent}%`;
      energyFill.innerText = `${stats.currentEnergy}/${stats.maxEnergy}`;

      // Stress
      const stressPercent = (stats.currentStress / stats.maxStress) * 100;
      const stressFill = document.querySelector('.stress-fill');
      stressFill.style.width = `${stressPercent}%`;
      stressFill.innerText = `${stats.currentStress}/${stats.maxStress}`;
    }

    window.addEventListener("DOMContentLoaded", () => {
      loadPlayerStats();
    });

    const monthNameEl = document.getElementById("month-name");
    const yearEl = document.getElementById("year");
    const calendarGrid = document.getElementById("calendar-grid");

    const monthNames = [
      "January", "February", "March", "April", "May", "June",
      "July", "August", "September", "October", "November", "December"
    ];

    let currentDate = new Date();

    function renderCalendar(date) {
      const year = date.getFullYear();
      const month = date.getMonth();

      monthNameEl.textContent = monthNames[month];
      yearEl.textContent = year;

      while (calendarGrid.children.length > 7) {
        calendarGrid.removeChild(calendarGrid.lastChild);
      }

      const firstDay = new Date(year, month, 1).getDay(); 
      const startDay = (firstDay + 6) % 7; 
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      for (let i = 0; i < startDay; i++) {
        const emptyDiv = document.createElement("div");
        calendarGrid.appendChild(emptyDiv);
      }

      const today = new Date();
      const isCurrentMonth = today.getFullYear() === year && today.getMonth() === month;

      for (let day = 1; day <= daysInMonth; day++) {
        const dayDiv = document.createElement("div");
        dayDiv.className = "day";
        dayDiv.textContent = day;

        if (isCurrentMonth && day === today.getDate()) {
          dayDiv.classList.add("today");
        }

        calendarGrid.appendChild(dayDiv);
      }
    }

    document.getElementById("prev-month").addEventListener("click", () => {
      currentDate.setMonth(currentDate.getMonth() - 1);
      renderCalendar(currentDate);
    });

    document.getElementById("next-month").addEventListener("click", () => {
      currentDate.setMonth(currentDate.getMonth() + 1);
      renderCalendar(currentDate);
    });

    renderCalendar(currentDate);

    const foodGrid = document.getElementById("food-items");
    const tabs = document.querySelectorAll(".tab");

    async function loadFood(category) {
        try {
            const res = await fetch(`/player/api/food/list?category=${category}`);
            if (!res.ok) throw new Error("API error");
            const items = await res.json();

            renderFood(items);

        } catch (err) {
            console.error("Failed to load food items:", err);
        }
    }

    function renderFood(items) {
        foodGrid.innerHTML = "";

        items.forEach(item => {
            const card = document.createElement("div");
            card.className = "food-card";

            card.innerHTML = `
                <img src="${item.imageUrl}" class="food-image" alt="${item.name}">
                
                <div class="food-info">
                    <p class="food-name">${item.name}</p>

                    <div class="food-bottom">
                        <div class="stats">
                            <p>+${item.energyAffected} energy</p>
                            <p>${item.stressAffected >= 0 ? "+" + item.stressAffected : item.stressAffected} stress</p>
                        </div>

                        <button class="price-btn" onclick="buyFood(${item.foodId}, ${item.price})">$${item.price}</button>
                    </div>
                </div>
            `;

            foodGrid.appendChild(card);
        });
    }

    tabs.forEach(tab => {
        tab.addEventListener("click", () => {
            tabs.forEach(t => t.classList.remove("active"));
            tab.classList.add("active");

            loadFood(tab.dataset.type);
        });
    });

    // Load MEAL first
    loadFood("meal");

    async function buyFood(foodId, price) {
        try {
            const res = await fetch(`/player/api/food/buy/${foodId}`, {
                method: "POST"
            });

            const data = await res.json();

            if (!res.ok) {
                alert("❌ " + (data.errorMessage || "Purchase failed"));
                return;
            }

            // --- UPDATE MONEY ---
            document.querySelector('.money-value').innerText =
                `$${Number(data.newBalance).toLocaleString()}`;

            // --- UPDATE ENERGY ---
            const energyFill = document.querySelector('.energy-fill');
            const energyPercent = (data.newCurrentEnergy / data.maxEnergy) * 100;

            energyFill.style.width = `${energyPercent}%`;
            energyFill.innerText = `${data.newCurrentEnergy}/${data.maxEnergy}`;

            // --- UPDATE STRESS ---
            const stressFill = document.querySelector('.stress-fill');
            const stressPercent = (data.newCurrentStress / data.maxStress) * 100;

            stressFill.style.width = `${stressPercent}%`;
            stressFill.innerText = `${data.newCurrentStress}/${data.maxStress}`;

        } catch (error) {
            console.error("Purchase error:", error);
            alert("❌ Failed to purchase food");
        }
    }

</script>


</html>
