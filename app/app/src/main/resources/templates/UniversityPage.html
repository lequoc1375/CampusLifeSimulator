<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>University Page</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/RegisterSubjects.css}" />
    <link rel="stylesheet" th:href="@{/css/StatsAndCalender.css}" />
    <link rel="stylesheet" th:href="@{/css/MenuBar.css}" />
    <link rel="stylesheet" th:href="@{/css/UniversityPage.css}" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <div th:replace="fragments/MenuBar :: header"></div>

    <div class="main-container">
      <div class="left-panel">
        <div class="player-stats-wrapper">
          <div class="player-stats-container">
            <div class="stat money">
              <label>Money</label>
              <span class="money-value">$0</span>
            </div>
            <div class="stat energy">
              <label>Energy</label>
              <div class="bar">
                <div class="fill energy-fill">0/0</div>
              </div>
            </div>
            <div class="stat stress">
              <label>Stress</label>
              <div class="bar">
                <div class="fill stress-fill">0/0</div>
              </div>
            </div>
            <hr class="divider" />
            <div class="stat gpa">
              <p class="credits">Number of Credits: N/A</p>
              <p class="gpa-value">Grade Point Average: N/A</p>
            </div>
            <button class="view-details">View Details</button>
          </div>
        </div>

        <div class="calendar-wrapper">
          <div class="calendar-container">
            <div class="calendar-header">
              <button id="prev-month" class="nav-btn">‹</button>
              <span id="month-name">Month</span>
              <span id="year">Year</span>
              <button id="next-month" class="nav-btn">›</button>
            </div>
            <div class="calendar-grid" id="calendar-grid">
              <div class="day-label">Mon</div>
              <div class="day-label">Tue</div>
              <div class="day-label">Wed</div>
              <div class="day-label">Thu</div>
              <div class="day-label">Fri</div>
              <div class="day-label">Sat</div>
              <div class="day-label">Sun</div>
            </div>
          </div>
        </div>
      </div>

      <div class="right-panel">
        <h2 class="page-title">Courses In Progress</h2>

        <div
          class="subjects-section"
          id="subjects-section"
          th:data-userid="${#authentication.principal.userId}"
        ></div>
      </div>
    </div>

    <script th:inline="javascript">
      async function loadPlayerStats() {
        try {
          const response = await fetch(
            '/player/api/stats/getByUser/[[${#authentication.principal.userId}]]'
          )
          if (!response.ok)
            throw new Error(`HTTP error! Status: ${response.status}`)
          const stats = await response.json()
          updateUI(stats)
        } catch (error) {
          console.error('Error loading stats:', error)
          document.querySelector('.player-stats-container').innerHTML =
            '<p>Error loading stats.</p>'
        }
      }

      function updateUI(stats) {
        document.querySelector('.money-value').innerText = `$${Number(
          stats.money
        ).toLocaleString()}`
        const energyPercent = (stats.currentEnergy / stats.maxEnergy) * 100
        const energyFill = document.querySelector('.energy-fill')
        energyFill.style.width = `${energyPercent}%`
        energyFill.innerText = `${stats.currentEnergy}/${stats.maxEnergy}`
        const stressPercent = (stats.currentStress / stats.maxStress) * 100
        const stressFill = document.querySelector('.stress-fill')
        stressFill.style.width = `${stressPercent}%`
        stressFill.innerText = `${stats.currentStress}/${stats.maxStress}`
      }

      window.addEventListener('DOMContentLoaded', () => {
        loadPlayerStats()
      })

      const monthNameEl = document.getElementById('month-name')
      const yearEl = document.getElementById('year')
      const calendarGrid = document.getElementById('calendar-grid')

      const monthNames = [
        'January',
        'February',
        'March',
        'April',
        'May',
        'June',
        'July',
        'August',
        'September',
        'October',
        'November',
        'December',
      ]

      let currentDate = new Date()

      function renderCalendar(date) {
        const year = date.getFullYear()
        const month = date.getMonth()
        monthNameEl.textContent = monthNames[month]
        yearEl.textContent = year
        while (calendarGrid.children.length > 7) {
          calendarGrid.removeChild(calendarGrid.lastChild)
        }
        const firstDay = new Date(year, month, 1).getDay()
        const startDay = (firstDay + 6) % 7
        const daysInMonth = new Date(year, month + 1, 0).getDate()
        for (let i = 0; i < startDay; i++) {
          calendarGrid.appendChild(document.createElement('div'))
        }
        const today = new Date()
        const isCurrentMonth =
          today.getFullYear() === year && today.getMonth() === month
        for (let day = 1; day <= daysInMonth; day++) {
          const dayDiv = document.createElement('div')
          dayDiv.className = 'day'
          dayDiv.textContent = day
          if (isCurrentMonth && day === today.getDate()) {
            dayDiv.classList.add('today')
          }
          calendarGrid.appendChild(dayDiv)
        }
      }

      document.getElementById('prev-month').addEventListener('click', () => {
        currentDate.setMonth(currentDate.getMonth() - 1)
        renderCalendar(currentDate)
      })
      document.getElementById('next-month').addEventListener('click', () => {
        currentDate.setMonth(currentDate.getMonth() + 1)
        renderCalendar(currentDate)
      })

      renderCalendar(currentDate)

      async function loadCourses() {
        try {
          const res = await fetch(
            '/player/api/course/list/[[${#authentication.principal.userId}]]'
          )
          if (!res.ok) throw new Error(`HTTP error! Status: ${res.status}`)
          const data = await res.json()
          renderInProgress(data.inProgress)
        } catch (err) {
          console.error('Failed to load courses:', err)
          document.getElementById('subjects-section').innerHTML =
            '<p>Error loading courses.</p>'
        }
      }

      function renderInProgress(courses) {
        const container = document.getElementById('subjects-section')
        container.innerHTML = ''
        courses.forEach((course) => {
          let countCompletedLesson = 0
          const card = document.createElement('div')
          card.classList.add('course-card')

          const left = document.createElement('div')
          left.classList.add('card-left')

          const top = document.createElement('div')
          top.classList.add('card-left-top')

          const title = document.createElement('h2')
          title.textContent = course.name

          const subtitle = document.createElement('p')
          subtitle.classList.add('subtitle')
          subtitle.textContent = 'Only for IU students'

          top.appendChild(title)
          top.appendChild(subtitle)

          const bottom = document.createElement('div')
          bottom.classList.add('card-left-bottom')

          const bottomTitle = document.createElement('h3')
          bottomTitle.textContent = course.name
          bottom.appendChild(bottomTitle)
          ;(course.lessons || []).forEach((lesson) => {
            if (
              lesson.lessonStudying &&
              lesson.lessonStudying.avaiStatus === 'able'
            ) {
              countCompletedLesson += 1
            }
          })

          const percent =
            course.lessons.length > 0
              ? Math.round((countCompletedLesson / course.lessons.length) * 100)
              : 0

          const progress = document.createElement('p')
          progress.classList.add('progress-text')
          progress.textContent = `${percent}% Completed`

          const footer = document.createElement('div')
          footer.classList.add('card-footer')
          footer.innerHTML = `<span>${course.credit} Credits</span><span>${course.lessons.length} Lectures</span>`

          bottom.appendChild(progress)
          bottom.appendChild(footer)

          left.appendChild(top)
          left.appendChild(bottom)

          const right = document.createElement('div')
          right.classList.add('card-right')
          ;(course.lessons || [])
            .sort((a, b) => a.lesson_order - b.lesson_order)
            .forEach((lesson) => {
              const lessonDiv = document.createElement('div')
              lessonDiv.classList.add('lesson')
              const lessonText = document.createElement('span')
              lessonText.textContent = lesson.name
              const btn = document.createElement('div')
              btn.classList.add('play-btn')
              if (
                lesson.lessonStudying &&
                lesson.lessonStudying.avaiStatus === 'able'
              ) {
                lessonDiv.classList.add('active')
                btn.textContent = '▶'
                lessonDiv.addEventListener('click', (e) => {
                  e.preventDefault()
                  window.location.href = `/lesson/${lesson.lessonId}/${course.subject_id}`
                })
              } else {
                lessonDiv.classList.add('disabled')
                btn.textContent = '🔒'
                btn.style.opacity = '0.3'
                btn.style.cursor = 'not-allowed'
              }
              lessonDiv.appendChild(lessonText)
              lessonDiv.appendChild(btn)
              right.appendChild(lessonDiv)
            })

          card.appendChild(left)
          card.appendChild(right)
          container.appendChild(card)
        })
      }

      window.addEventListener('DOMContentLoaded', () => {
        loadCourses()
      })
    </script>
  </body>
</html>
