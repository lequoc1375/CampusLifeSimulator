<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Meals</title>
  </head>
  <body>
    <h2>Number of Meals to Add:</h2>
    <input type="number" id="noOfMeals" min="1" max="10" value="1" />
    <button onclick="generateMealForm()">Generate Meal Table</button>

    <form id="formMeal">
      <table border="1">
        <thead>
          <tr>
            <th>Name</th>
            <th>Start Time</th>
            <th>End Time</th>
          </tr>
        </thead>
        <tbody id="mealTable"></tbody>
      </table>
      <br />
      <button type="submit">Add Meals</button>
    </form>

    <h2>Meal List</h2>
    <table border="1">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Start</th>
          <th>End</th>
          <th>Delete</th>
          <th>Update</th>
        </tr>
      </thead>
      <tbody id="mealListTableBody"></tbody>
    </table>

    <div
      id="updateModal"
      style="
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        padding: 20px;
        border: 1px solid black;
        z-index: 999;
      "
    >
      <h3>Update Meal</h3>
      <form id="updateForm">
        <input type="hidden" id="updateMealId" />
        <label>Name:</label><br />
        <input type="text" id="updateMealName" required /><br /><br />
        <label>Start Time:</label><br />
        <input type="time" id="updateStartTime" required /><br /><br />
        <label>End Time:</label><br />
        <input type="time" id="updateEndTime" required /><br /><br />
        <button type="submit">Save</button>
        <button type="button" onclick="closeModal()">Cancel</button>
      </form>
    </div>

    <script>
      async function loadMeals() {
        const res = await fetch('/admin/api/meal')
        const meals = await res.json()
        const table = document.getElementById('mealListTableBody')
        table.innerHTML = ''
        meals.forEach((meal) => {
          const row = document.createElement('tr')
          row.innerHTML = `
          <td>${meal.mealId}</td>
          <td>${meal.name}</td>
          <td>${meal.startTime}</td>
          <td>${meal.endTime}</td>
          <td><button class="btn-delete" data-id="${meal.mealId}">🗑️</button></td>
          <td><button class="btn-update" data-id="${meal.mealId}">✏️</button></td>
        `
          table.appendChild(row)
        })
      }

      function generateMealForm() {
        const count = parseInt(document.getElementById('noOfMeals').value)
        const table = document.getElementById('mealTable')
        table.innerHTML = ''
        for (let i = 0; i < count; i++) {
          const row = document.createElement('tr')
          row.innerHTML = `
          <td><input name="name" required /></td>
          <td><input type="time" name="start" required /></td>
          <td><input type="time" name="end" required /></td>
        `
          table.appendChild(row)
        }
      }

      document
        .getElementById('formMeal')
        .addEventListener('submit', async function (e) {
          e.preventDefault()
          const rows = document.querySelectorAll('#mealTable tr')
          const meals = Array.from(rows).map((row) => {
            const inputs = row.querySelectorAll('input')
            return {
              name: inputs[0].value,
              startTime: inputs[1].value,
              endTime: inputs[2].value,
            }
          })

          try {
            for (const meal of meals) {
              const res = await fetch('/admin/api/meal', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(meal),
              })
              if (!res.ok) throw new Error('Add failed')
            }
            await loadMeals()
            alert('Meal(s) added!')
          } catch (err) {
            console.error(err)
            alert(err.message)
          }
        })

      document.addEventListener('click', async function (e) {
        if (e.target.classList.contains('btn-delete')) {
          const id = e.target.getAttribute('data-id')
          if (!confirm('Confirm delete?')) return
          try {
            const res = await fetch(`/admin/api/meal/${id}`, {
              method: 'DELETE',
            })
            if (!res.ok) throw new Error('Delete failed')
            await loadMeals()
          } catch (err) {
            console.error(err)
            alert(err.message)
          }
        }

        if (e.target.classList.contains('btn-update')) {
          const row = e.target.closest('tr')
          openModal({
            mealId: e.target.getAttribute('data-id'),
            name: row.children[1].innerText,
            startTime: row.children[2].innerText,
            endTime: row.children[3].innerText,
          })
        }
      })

      function openModal(meal) {
        document.getElementById('updateMealId').value = meal.mealId
        document.getElementById('updateMealName').value = meal.name
        document.getElementById('updateStartTime').value = meal.startTime
        document.getElementById('updateEndTime').value = meal.endTime
        document.getElementById('updateModal').style.display = 'block'
      }

      function closeModal() {
        document.getElementById('updateModal').style.display = 'none'
      }

      document
        .getElementById('updateForm')
        .addEventListener('submit', async function (e) {
          e.preventDefault()
          const meal = {
            name: document.getElementById('updateMealName').value,
            startTime: document.getElementById('updateStartTime').value,
            endTime: document.getElementById('updateEndTime').value,
          }
          const id = document.getElementById('updateMealId').value
          try {
            const res = await fetch(`/admin/api/meal/${id}`, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(meal),
            })
            if (!res.ok) throw new Error('Update failed')
            await loadMeals()
            closeModal()
            alert('Meal updated!')
          } catch (err) {
            console.error(err)
            alert(err.message)
          }
        })

      window.addEventListener('DOMContentLoaded', loadMeals)
    </script>
  </body>
</html>
