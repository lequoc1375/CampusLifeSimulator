<!DOCTYPE html>
<html lang="en">
  <gear>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Shop Gear Accessories</title>
  </gear>
  <body>
    <h2>Number of Shop Gear Accessories to Add:</h2>
    <input type="number" id="noOfAccessoriess" min="1" max="10" value="1" />
    <button onclick="generateAccessoriesForm()">
      Generate Accessories Table
    </button>

    <form id="formAccessories">
      <table border="1">
        <tgear>
          <tr>
            <th>Shop ID</th>
            <th>Gear Accessories ID</th>
            <th>Status</th>
          </tr>
        </tgear>
        <tbody id="accessoriesTable"></tbody>
      </table>
      <br />
      <button type="submit">Add Shop Gear Accessories</button>
    </form>

    <h2>Shop Gear Accessories List</h2>
    <table border="1">
      <tgear>
        <tr>
          <th>ID</th>
          <th>Shop ID</th>
          <th>Gear Accessories ID</th>
          <th>Status</th>
          <th>Delete</th>
          <th>Update</th>
        </tr>
      </tgear>
      <tbody id="accessoriesListTableBody"></tbody>
    </table>

    <div
      id="updateModal"
      style="
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        gearground: white;
        padding: 20px;
        border: 1px solid black;
        z-index: 999;
      "
    >
      <h3>Update Shop Gear Accessories</h3>
      <form id="updateForm">
        <input type="hidden" id="updateAccessoriesId" />
        <label>Shop ID:</label><br />
        <select id="updateShopId" required></select
        ><br />
        <label>Gear Accessories ID:</label><br />
        <select id="updateGearId" required></select
        ><br />
        <label>Status:</label><br />
        <select id="updateStatus" required>
          <option value="">Select Status</option>
          <option value="Owned">Owned</option>
          <option value="Unowned">Unowned</option></select
        ><br /><br />
        <button type="submit">Save</button>
        <button type="button" onclick="closeModal()">Cancel</button>
      </form>
    </div>

    <script>
      let shopList = []
      let gearList = []

      async function loadShops() {
        const response = await fetch('/admin/api/shops')
        shopList = await response.json()
      }

      async function loadGears() {
        const response = await fetch('/admin/api/gearaccessories/list')
        gearList = await response.json()
      }

      async function generateAccessoriesForm() {
        const count = parseInt(
          document.getElementById('noOfAccessoriess').value
        )
        const table = document.getElementById('accessoriesTable')
        table.innerHTML = ''
        for (let i = 0; i < count; i++) {
          const row = document.createElement('tr')
          row.innerHTML = `
            <td>
              <select name="shopId" required>
                <option value="">Select Shop ID</option>
                ${shopList
                  .map(
                    (shop) =>
                      `<option value="${shop.shopId}">${shop.shopId}</option>`
                  )
                  .join('')}
              </select>
            </td>
            <td>
              <select name="gearId" required>
                <option value="">Select Gear Accessories ID</option>
                ${gearList
                  .map(
                    (gear) =>
                      `<option value="${gear.gearId}">${gear.gearId}</option>`
                  )
                  .join('')}
              </select>
            </td>
            <td>
              <select name="status" required>
                <option value="">Select Status</option>
                <option value="Owned">Owned</option>
                <option value="Unowned">Unowned</option>
              </select>
            </td>
          `
          table.appendChild(row)
        }
      }

      async function loadAccessories() {
        const res = await fetch('/admin/api/shopGearAccessories/list')
        const accessoriesList = await res.json()
        const tableBody = document.getElementById('accessoriesListTableBody')
        tableBody.innerHTML = ''
        accessoriesList.forEach((accessories) => {
          const row = document.createElement('tr')
          row.innerHTML = `
            <td>${accessories.shopGearId}</td>
            <td>${accessories.shopId}</td>
            <td>${accessories.gearId}</td>
            <td>${accessories.status}</td>
            <td><button class="btn-delete" data-id="${accessories.shopGearId}">🗑️</button></td>
            <td><button class="btn-update" data-id="${accessories.shopGearId}">✏️</button></td>
          `
          tableBody.appendChild(row)
        })
      }

      document
        .getElementById('formAccessories')
        .addEventListener('submit', async function (e) {
          e.preventDefault()
          const rows = document.querySelectorAll('#accessoriesTable tr')
          const accessoriess = Array.from(rows).map((row) => {
            const inputs = row.querySelectorAll('select')
            return {
              shopId: parseInt(inputs[0].value),
              gearId: parseInt(inputs[1].value),
              status: inputs[2].value,
            }
          })

          try {
            for (const accessories of accessoriess) {
              const res = await fetch('/admin/api/shopGearAccessories/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(accessories),
              })
              if (!res.ok) throw new Error('Add failed')
            }
            await loadAccessories()
            alert('Items added successfully!')
          } catch (err) {
            console.error(err)
            alert(err.message)
          }
        })

      document.addEventListener('click', async function (e) {
        if (e.target.classList.contains('btn-delete')) {
          const id = e.target.getAttribute('data-id')
          if (!confirm('Delete this Shop Gear Accessories?')) return
          try {
            const res = await fetch(
              `/admin/api/shopGearAccessories/delete/${id}`,
              {
                method: 'DELETE',
              }
            )
            if (!res.ok) throw new Error('Delete failed')
            await loadAccessories()
            alert('Item deleted successfully!')
          } catch (err) {
            console.error(err)
            alert(err.message)
          }
        }

        if (e.target.classList.contains('btn-update')) {
          const row = e.target.closest('tr')
          openModal({
            shopGearId: e.target.getAttribute('data-id'),
            shopId: row.children[1].innerText,
            gearId: row.children[2].innerText,
            status: row.children[3].innerText.trim(),
          })
        }
      })

      function openModal(accessories) {
        document.getElementById('updateAccessoriesId').value =
          accessories.shopGearId
        const shopSelect = document.getElementById('updateShopId')
        shopSelect.innerHTML = `<option value="">Select Shop ID</option>`
        shopList.forEach((shop) => {
          const opt = document.createElement('option')
          opt.value = shop.shopId
          opt.textContent = shop.shopId
          if (shop.shopId == accessories.shopId) opt.selected = true
          shopSelect.appendChild(opt)
        })

        const gearSelect = document.getElementById('updateGearId')
        gearSelect.innerHTML = `<option value="">Select Gear Accessories ID</option>`
        gearList.forEach((gear) => {
          const opt = document.createElement('option')
          opt.value = gear.gearId
          opt.textContent = gear.gearId
          if (gear.gearId == accessories.gearId) opt.selected = true
          gearSelect.appendChild(opt)
        })

        const statusSelect = document.getElementById('updateStatus')
        const normalizedStatus =
          accessories.status.charAt(0).toUpperCase() +
          accessories.status.slice(1).toLowerCase()
        statusSelect.value =
          normalizedStatus === 'Owned' || normalizedStatus === 'Unowned'
            ? normalizedStatus
            : ''
        document.getElementById('updateModal').style.display = 'block'
      }

      function closeModal() {
        document.getElementById('updateModal').style.display = 'none'
      }

      document
        .getElementById('updateForm')
        .addEventListener('submit', async function (e) {
          e.preventDefault()
          const accessories = {
            shopGearId: document.getElementById('updateAccessoriesId').value,
            shopId: parseInt(document.getElementById('updateShopId').value),
            gearId: parseInt(document.getElementById('updateGearId').value),
            status: document.getElementById('updateStatus').value,
          }

          try {
            const res = await fetch(
              `/admin/api/shopGearAccessories/update/${accessories.shopGearId}`,
              {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(accessories),
              }
            )
            if (!res.ok) throw new Error('Update failed')
            await loadAccessories()
            closeModal()
            alert('Item updated successfully!')
          } catch (err) {
            console.error(err)
            alert(err.message)
          }
        })

      window.addEventListener('DOMContentLoaded', async () => {
        await loadShops()
        await loadGears()
        await generateAccessoriesForm()
        await loadAccessories()
      })
    </script>
  </body>
</html>
