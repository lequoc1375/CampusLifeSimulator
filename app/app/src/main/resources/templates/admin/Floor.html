<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Floor Management</title>
  </head>
  <body>
    <h2>Number of floors to add:</h2>
    <input type="number" id="noOfFloors" min="1" max="10" value="1" />
    <button onclick="generateFloorForm()">Generate Floor Table</button>

    <form id="formFloor">
      <table border="1">
        <thead>
          <tr>
            <th>Price</th>
            <th>Image URL</th>
          </tr>
        </thead>
        <tbody id="floorsTable"></tbody>
      </table>
      <br />
      <button type="submit">Add Floor(s)</button>
    </form>

    <h2>Floor List</h2>
    <table border="1">
      <thead>
        <tr>
          <th>ID</th>
          <th>Price</th>
          <th>Image</th>
          <th>Delete</th>
          <th>Update</th>
        </tr>
      </thead>
      <tbody id="floorListTableBody"></tbody>
    </table>

    <div
      id="updateModal"
      style="
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        padding: 20px;
        border: 1px solid black;
        z-index: 999;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
      "
    >
      <h3>Update Floor</h3>
      <form id="updateForm">
        <input type="hidden" id="updateFloorId" />
        <label>Price:</label><br />
        <input type="number" id="updatePrice" required /><br /><br />
        <label>Image URL:</label><br />
        <input type="text" id="updateImage" required /><br /><br />
        <button type="submit">Save</button>
        <button type="button" onclick="closeModal()">Cancel</button>
      </form>
    </div>

    <script>
      async function generateFloorForm() {
        const count = parseInt(document.getElementById('noOfFloors').value)
        if (count <= 0) return

        const table = document.getElementById('floorsTable')
        table.innerHTML = ''

        for (let i = 0; i < count; i++) {
          const row = document.createElement('tr')
          row.innerHTML = `
            <td><input type="number" name="price" required></td>
            <td><input type="text" name="image" required></td>
          `
          table.appendChild(row)
        }
      }

      async function loadFloors() {
        const response = await fetch('/admin/api/floor/all')
        const floorList = await response.json()

        const tableBody = document.getElementById('floorListTableBody')
        tableBody.innerHTML = ''

        floorList.forEach((floor) => {
          const row = document.createElement('tr')
          row.innerHTML = `
            <td>${floor.floorId}</td>
            <td>${floor.price}</td>
            <td><img src="${floor.image}" alt="Floor Image" width="100"/></td>
            <td><button class="btn-delete" data-id="${floor.floorId}">🗑️ Delete</button></td>
            <td><button class="btn-update" data-id="${floor.floorId}">✏️ Update</button></td>
          `
          tableBody.appendChild(row)
        })
      }

      document
        .getElementById('formFloor')
        .addEventListener('submit', async function (e) {
          e.preventDefault()
          const rows = document.querySelectorAll('#floorsTable tr')
          const floors = []
          rows.forEach((row) => {
            const inputs = row.querySelectorAll('input')
            const floor = {
              price: parseFloat(inputs[0].value),
              image: inputs[1].value,
            }
            floors.push(floor)
          })

          try {
            for (const floor of floors) {
              const res = await fetch('/admin/api/floor/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(floor),
              })
              if (!res.ok) throw new Error(`Error adding floor`)
            }
            await loadFloors()
          } catch (err) {
            console.error(err)
            alert(err.message)
          }
        })

      document.addEventListener('click', async function (e) {
        if (e.target.classList.contains('btn-delete')) {
          const floorId = e.target.getAttribute('data-id')
          if (!confirm('Confirm delete?')) return

          try {
            const res = await fetch(`/admin/api/floor/delete/${floorId}`, {
              method: 'DELETE',
            })
            if (!res.ok) throw new Error('Delete failed')
            await loadFloors()
            alert('Floor deleted successfully!')
          } catch (err) {
            console.error(err)
            alert(err.message)
          }
        }

        if (e.target.classList.contains('btn-update')) {
          const row = e.target.closest('tr')
          const floor = {
            floorId: row.children[0].innerText,
            price: row.children[1].innerText,
            image: row.children[2].querySelector('img').src,
          }
          openModal(floor)
        }
      })

      function openModal(floor) {
        document.getElementById('updateFloorId').value = floor.floorId
        document.getElementById('updatePrice').value = floor.price
        document.getElementById('updateImage').value = floor.image
        document.getElementById('updateModal').style.display = 'block'
      }

      function closeModal() {
        document.getElementById('updateModal').style.display = 'none'
      }

      document
        .getElementById('updateForm')
        .addEventListener('submit', async function (e) {
          e.preventDefault()
          const floor = {
            price: parseFloat(document.getElementById('updatePrice').value),
            image: document.getElementById('updateImage').value,
          }
          const floorId = document.getElementById('updateFloorId').value

          try {
            const res = await fetch(`/admin/api/floor/update/${floorId}`, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(floor),
            })
            if (!res.ok) throw new Error('Update failed')
            await loadFloors()
            closeModal()
            alert('Floor updated successfully!')
          } catch (err) {
            console.error(err)
            alert(err.message)
          }
        })

      window.addEventListener('DOMContentLoaded', loadFloors)
    </script>
  </body>
</html>
