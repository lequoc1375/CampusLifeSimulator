<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Manage UpperCloth</title>
    <link rel="stylesheet" th:href="@{/css/AdminCloth.css}" />
  </head>
  <body>
    <h2>Number of UpperCloth to Add:</h2>
    <input type="number" id="noOfCloths" min="1" max="10" value="1" />
    <button onclick="generateClothForm()">Generate Cloth Table</button>

    <!-- form add -->
    <form id="formCloth" enctype="multipart/form-data">
      <table border="1">
        <thead>
          <tr>
            <th>Name</th>
            <th>Image</th>
            <th>Price</th>
            <th>Categories</th>
          </tr>
        </thead>
        <tbody id="clothTable"></tbody>
      </table>
      <br />
      <button type="submit">Add UpperCloth</button>
    </form>

    <h2>UpperCloth List</h2>
    <div id="clothList" class="cloth-container"></div>

    <!-- Update modal -->
    <div id="updateModal">
      <h3>Update UpperCloth</h3>
      <form id="updateForm" enctype="multipart/form-data">
        <input type="hidden" id="updateClothId" />
        <label>Name:</label><br />
        <input type="text" id="updateName" required /><br />
        <label>Image:</label><br />
        <input type="file" id="updateImage" accept="image/*" /><br />
        <label>Price:</label><br />
        <input type="number" step="0.01" id="updatePrice" required /><br />
        <label>Categories:</label><br />
        <input type="text" id="updateCategories" required /><br /><br />
        <button type="submit">Save</button>
        <button type="button" onclick="closeModal()">Cancel</button>
      </form>
    </div>

    <script>
    // Generate add form
    function generateClothForm() {
      const count = parseInt(document.getElementById("noOfCloths").value);
      const table = document.getElementById("clothTable");
      table.innerHTML = "";
      for (let i = 0; i < count; i++) {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td><input type="text" name="name" required /></td>
          <td><input type="file" name="image" accept="image/*" /></td>
          <td><input type="number" step="0.01" name="price" required /></td>
          <td><input type="text" name="categories" required /></td>
        `;
        table.appendChild(row);
      }
    }

    // Load list
    async function loadCloths() {
      const res = await fetch("/admin/api/uppercloth");
      const cloths = await res.json();
      const list = document.getElementById("clothList");
      list.innerHTML = "";

      cloths.forEach((cloth) => {
        const card = document.createElement("div");
        card.className = "cloth-card";
        card.innerHTML = `
          <button class="delete-btn" data-id="${cloth.upperId}">Delete</button>
          <img src="${cloth.imageUrl || ""}" alt="${cloth.name}" />
          <div class="info">
            <p><strong>Name:</strong> ${cloth.name}</p>
            <p><strong>Price:</strong> ${cloth.price}</p>
            <p><strong>Category:</strong> ${cloth.categories}</p>
          </div>
          <button class="edit-btn btn-update" data-id="${cloth.upperId}">Edit</button>
        `;
        list.appendChild(card);
      });
    }

    // Add cloths (with prevent double-click)
    document.getElementById("formCloth").addEventListener("submit", async (e) => {
      e.preventDefault();

      const addButton = document.querySelector("#formCloth button[type='submit']");
      addButton.disabled = true;
      addButton.textContent = "Adding...";

      const rows = document.querySelectorAll("#clothTable tr");

      for (const row of rows) {
        const inputs = row.querySelectorAll("input");
        const formData = new FormData();

        formData.append("name", inputs[0].value);
        if (inputs[1].files.length > 0) {
          formData.append("image", inputs[1].files[0]);
        }
        formData.append("price", inputs[2].value);
        formData.append("categories", inputs[3].value);

        await fetch("/admin/api/uppercloth", {
          method: "POST",
          body: formData,
        });
      }

      await loadCloths();
      document.getElementById("formCloth").reset();

      addButton.disabled = false;
      addButton.textContent = "Add UpperCloth";
    });

    // Delete / Update click
    document.addEventListener("click", async (e) => {
      if (e.target.classList.contains("delete-btn")) {
        const id = e.target.dataset.id;
        if (!confirm("Delete this UpperCloth?")) return;

        await fetch(`/admin/api/uppercloth/${id}`, {
          method: "DELETE",
        });

        await loadCloths();
      }

      if (e.target.classList.contains("btn-update")) {
        const id = e.target.dataset.id;
        const res = await fetch(`/admin/api/uppercloth/${id}`);
        const cloth = await res.json();
        openModal(cloth);
      }
    });

    // Open modal
    function openModal(cloth) {
      document.getElementById("updateClothId").value = cloth.upperId;
      document.getElementById("updateName").value = cloth.name;
      document.getElementById("updatePrice").value = cloth.price;
      document.getElementById("updateCategories").value = cloth.categories;
      document.getElementById("updateModal").style.display = "block";
    }

    // Close modal
    function closeModal() {
      document.getElementById("updateModal").style.display = "none";
    }

    // Submit update
    document.getElementById("updateForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const id = document.getElementById("updateClothId").value;
      const formData = new FormData();

      formData.append("name", document.getElementById("updateName").value);
      formData.append("price", document.getElementById("updatePrice").value);
      formData.append("categories", document.getElementById("updateCategories").value);

      const fileInput = document.getElementById("updateImage");
      if (fileInput.files.length > 0) {
        formData.append("image", fileInput.files[0]);
      }

      await fetch(`/admin/api/uppercloth/${id}`, {
        method: "PUT",
        body: formData,
      });

      await loadCloths();
      closeModal();
    });

    // Auto load
    window.addEventListener("DOMContentLoaded", loadCloths);
  </script>

  </body>
</html>
