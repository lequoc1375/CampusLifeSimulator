<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add lesson</title>
  </head>
  <body>
    <h2>Number of lesson want to add.</h2>
    <input type="number" id="noOfLessons" min="1" max="10" value="1" />
    <button onclick="generateLessonForm()">Generate Table Lesson</button>
    <form id="formLesson">
      <table border="1">
        <thead>
          <tr>
            <th>Lesson name</th>
            <th>Lesson order</th>
            <th>Length</th>
            <th>Video link</th>
            <th>Subject</th>
          </tr>
        </thead>
        <tbody id="lessonsTable"></tbody>
      </table>
      <br />
      <button type="submit">Add lesson</button>
    </form>

    <h2>Lesson List</h2>
    <table border="1">
      <thead>
        <tr>
          <th>Lesson ID</th>
          <th>Name</th>
          <th>Subject Type</th>
          <th>Lesson Order</th>
          <th>Lesson Length</th>
          <th>Link video</th>
          <th>Delete</th>
        </tr>
      </thead>
      <tbody id="lessonListTableBody"></tbody>
    </table>
  </body>

  <script>
    let subjectList = []

    async function loadSubjects() {
      const response = await fetch('/admin/api/subjects/get')
      subjectList = await response.json()
    }

    async function generateLessonForm() {
      const noOfRow = parseInt(document.getElementById('noOfLessons').value)
      if (noOfRow <= 0) {
        return
      }

      await loadSubjects()
      if (subjectList == null) {
        console.log('Error in fetching data subnjects')
        return
      }

      const table = document.getElementById('lessonsTable')
      table.innerHTML = ''

      for (let i = 0; i < noOfRow; i++) {
        const rows = document.createElement('tr')
        let options = `<option value=""></option>`
        subjectList.forEach((sub) => {
          options += `<option value = "${sub.subject_id}">${sub.name}</option>`
        })
        rows.innerHTML = `
          <td><input type="text" name="name" required></td>
          <td><input type="number" name="lesson_order" min="1" required></td>
          <td><input type="number" name="length" min="1" required></td>
          <td><input type="text" name="link_video" required></td>
          <td>
            <select name="subject_id">
              ${options}
              </select>
            </td>
        `
        table.appendChild(rows)
      }
    }

    async function loadLesson() {
      const response = await fetch('/admin/api/lessons/list')
      const lessonList = await response.json()

      const tableBody = document.getElementById('lessonListTableBody')
      tableBody.innerHTML = ''

      lessonList.forEach((lesson) => {
        const row = document.createElement('tr')
        row.innerHTML = `
            <th>${lesson.lesson_id}</th>
            <th>${lesson.name}</th>
            <th>${lesson.subject_name}</th>
            <th>${lesson.lesson_order}</th>
            <th>${lesson.length}</th>
            <th>${lesson.link_video}</th>
            <td>
              <button class="btn-delete" data-id="${lesson.lesson_id}">🗑️ Delete</button>
            </td>
          `
        tableBody.appendChild(row)
      })
    }

    document
      .getElementById('formLesson')
      .addEventListener('submit', async function (e) {
        e.preventDefault()
        const rows = document.querySelectorAll('#lessonsTable tr')
        const lessons = []
        rows.forEach((row) => {
          const inputs = row.querySelectorAll('input, select')
          const lesson = {
            name: inputs[0].value,
            lesson_order: parseInt(inputs[1].value),
            length: parseInt(inputs[2].value),
            link_video: inputs[3].value,
            subject_id: parseInt(inputs[4].value),
          }
          lessons.push(lesson)
        })
        try {
          for (const lesson of lessons) {
            const responses = await fetch('/admin/api/lesson/add', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(lesson),
            })
            if (!responses.ok) {
              throw new Error(`Error in inserting new lesson: ${lesson.name}`)
            }
          }
          await loadLesson()
          document
            .getElementById('lessonListTableBody')
            .scrollIntoView({ behavior: 'smooth' })
        } catch (error) {
          console.error(error)
          alert('An error occurred: ' + error.message)
        }
      })
    window.addEventListener('DOMContentLoaded', () => {
      loadLesson()
    })

    document.addEventListener('click', async function (e) {
      if (e.target.classList.contains('btn-delete')) {
        const lessonId = e.target.getAttribute('data-id')
        const confirmed = confirm(
          'Are you sure you want to delete this lesson?'
        )
        if (!confirmed) return

        try {
          const res = await fetch(`/admin/api/lesson/delete/${lessonId}`, {
            method: 'DELETE',
          })
          if (!res.ok) {
            throw new Error('Delete failed')
          }
          await loadLesson()
          alert('Lesson deleted successfully!')
        } catch (err) {
          console.error(err)
          alert('Error deleting lesson: ' + err.message)
        }
      }
    })
  </script>
</html>
