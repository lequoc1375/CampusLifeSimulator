<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Manage GearAccessories</title>
  </head>
  <body>
    <h2>Number of GearAccessories to Add:</h2>
    <input type="number" id="noOfItems" min="1" max="10" value="1" />
    <button onclick="generateForm()">Generate GearAccessories Table</button>

    <form id="formItem">
      <table border="1">
        <thead>
          <tr>
            <th>Name</th>
            <th>Image</th>
            <th>Price</th>
            <th>Categories</th>
          </tr>
        </thead>
        <tbody id="itemTable"></tbody>
      </table>
      <br />
      <button type="submit">Add GearAccessories</button>
    </form>

    <h2>GearAccessories List</h2>
    <table border="1">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Image</th>
          <th>Price</th>
          <th>Categories</th>
          <th>Delete</th>
          <th>Update</th>
        </tr>
      </thead>
      <tbody id="itemListTableBody"></tbody>
    </table>

    <div
      id="updateModal"
      style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%);
             background:white; padding:20px; border:1px solid black; z-index:999;"
    >
      <h3>Update GearAccessories</h3>
      <form id="updateForm">
        <input type="hidden" id="updateItemId" />
        <label>Name:</label><br />
        <input type="text" id="updateName" required /><br />
        <label>Image:</label><br />
        <input type="text" id="updateImage" required /><br />
        <label>Price:</label><br />
        <input type="number" step="0.01" id="updatePrice" required /><br />
        <label>Categories:</label><br />
        <input type="text" id="updateCategories" required /><br /><br />
        <button type="submit">Save</button>
        <button type="button" onclick="closeModal()">Cancel</button>
      </form>
    </div>

    <script>
      async function generateForm() {
        const count = parseInt(document.getElementById('noOfItems').value)
        const table = document.getElementById('itemTable')
        table.innerHTML = ''
        for (let i = 0; i < count; i++) {
          const row = document.createElement('tr')
          row.innerHTML = `
            <td><input type="text" name="name" required /></td>
            <td><input type="text" name="image" required /></td>
            <td><input type="number" step="0.01" name="price" required /></td>
            <td><input type="text" name="categories" required /></td>
          `
          table.appendChild(row)
        }
      }

      async function loadItems() {
        const res = await fetch('/admin/api/gearaccessories/list')
        const items = await res.json()
        const tableBody = document.getElementById('itemListTableBody')
        tableBody.innerHTML = ''
        items.forEach((item) => {
          const row = document.createElement('tr')
          row.innerHTML = `
            <td>${item.gearId}</td>
            <td>${item.name}</td>
            <td>${item.image}</td>
            <td>${item.price}</td>
            <td>${item.categories}</td>
            <td><button class="btn-delete" data-id="${item.gearId}">🗑️</button></td>
            <td><button class="btn-update" data-id="${item.gearId}">✏️</button></td>
          `
          tableBody.appendChild(row)
        })
      }

      document.getElementById('formItem').addEventListener('submit', async function (e) {
        e.preventDefault()
        const rows = document.querySelectorAll('#itemTable tr')
        const items = Array.from(rows).map((row) => {
          const inputs = row.querySelectorAll('input')
          return {
            name: inputs[0].value,
            image: inputs[1].value,
            price: parseFloat(inputs[2].value),
            categories: inputs[3].value,
          }
        })

        try {
          for (const item of items) {
            const res = await fetch('/admin/api/gearaccessories/add', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(item),
            })
            if (!res.ok) throw new Error('Add failed')
          }
          await loadItems()
        } catch (err) {
          console.error(err)
          alert(err.message)
        }
      })

      document.addEventListener('click', async function (e) {
        if (e.target.classList.contains('btn-delete')) {
          const id = e.target.getAttribute('data-id')
          if (!confirm('Delete this GearAccessories?')) return
          try {
            const res = await fetch(`/admin/api/gearaccessories/delete/${id}`, { method: 'DELETE' })
            if (!res.ok) throw new Error('Delete failed')
            await loadItems()
          } catch (err) {
            console.error(err)
            alert(err.message)
          }
        }

        if (e.target.classList.contains('btn-update')) {
          const row = e.target.closest('tr')
          openModal({
            gearId: e.target.getAttribute('data-id'),
            name: row.children[1].innerText,
            image: row.children[2].innerText,
            price: row.children[3].innerText,
            categories: row.children[4].innerText,
          })
        }
      })

      function openModal(item) {
        document.getElementById('updateItemId').value = item.gearId
        document.getElementById('updateName').value = item.name
        document.getElementById('updateImage').value = item.image
        document.getElementById('updatePrice').value = item.price
        document.getElementById('updateCategories').value = item.categories
        document.getElementById('updateModal').style.display = 'block'
      }

      function closeModal() {
        document.getElementById('updateModal').style.display = 'none'
      }

      document.getElementById('updateForm').addEventListener('submit', async function (e) {
        e.preventDefault()
        const item = {
          gearId: document.getElementById('updateItemId').value,
          name: document.getElementById('updateName').value,
          image: document.getElementById('updateImage').value,
          price: parseFloat(document.getElementById('updatePrice').value),
          categories: document.getElementById('updateCategories').value,
        }

        try {
          const res = await fetch(`/admin/api/gearaccessories/update/${item.gearId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(item),
          })
          if (!res.ok) throw new Error('Update failed')
          await loadItems()
          closeModal()
        } catch (err) {
          console.error(err)
          alert(err.message)
        }
      })

      window.addEventListener('DOMContentLoaded', () => {
        loadItems()
      })
    </script>
  </body>
</html>
