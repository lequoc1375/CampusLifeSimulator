<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Manage Job</title>
  </head>
  <body>
    <h2>Number of Jobs to Add:</h2>
    <input type="number" id="noOfJobs" min="1" max="10" value="1" />
    <button onclick="generateJobForm()">Generate Job Table</button>

    <form id="formJob">
      <table border="1">
        <thead>
          <tr>
            <th>Name</th>
            <th>Energy Affected</th>
            <th>Stress Affected</th>
            <th>Salary</th>
            <th>Contract Period</th>
            <th>Exp Multiple</th>
          </tr>
        </thead>
        <tbody id="jobTable"></tbody>
      </table>
      <br />
      <button type="submit">Add Job</button>
    </form>

    <h2>Job List</h2>
    <table border="1">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Energy Affected</th>
          <th>Stress Affected</th>
          <th>Salary</th>
          <th>Contract Period</th>
          <th>Exp Multiple</th>
          <th>Delete</th>
          <th>Update</th>
        </tr>
      </thead>
      <tbody id="jobListTableBody"></tbody>
    </table>

    <div
      id="updateModal"
      style="
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        padding: 20px;
        border: 1px solid black;
        z-index: 999;
      "
    >
      <h3>Update Job</h3>
      <form id="updateForm">
        <input type="hidden" id="updateJobId" />
        <label>Name:</label><br />
        <input type="text" id="updateName" required /><br />
        <label>Energy Affected:</label><br />
        <input type="number" id="updateEnergy" required /><br />
        <label>Stress Affected:</label><br />
        <input type="number" id="updateStress" required /><br />
        <label>Salary:</label><br />
        <input type="number" id="updateSalary" required /><br />
        <label>Contract Period:</label><br />
        <input type="number" id="updateContract" required /><br />
        <label>Exp Multiple:</label><br />
        <input type="number" step="0.01" id="updateExp" required /><br /><br />
        <button type="submit">Save</button>
        <button type="button" onclick="closeModal()">Cancel</button>
      </form>
    </div>

    <script>
      async function generateJobForm() {
        const count = parseInt(document.getElementById('noOfJobs').value)
        const table = document.getElementById('jobTable')
        table.innerHTML = ''
        for (let i = 0; i < count; i++) {
          const row = document.createElement('tr')
          row.innerHTML = `
            <td><input type="text" name="name" required /></td>
            <td><input type="number" name="energy" required /></td>
            <td><input type="number" name="stress" required /></td>
            <td><input type="number" name="salary" required /></td>
            <td><input type="number" name="contract" required /></td>
            <td><input type="number" step="0.01" name="exp" required /></td>
          `
          table.appendChild(row)
        }
      }

      async function loadJobs() {
        const res = await fetch('/admin/api/job/list')
        const jobs = await res.json()
        const tableBody = document.getElementById('jobListTableBody')
        tableBody.innerHTML = ''
        jobs.forEach((job) => {
          const row = document.createElement('tr')
          row.innerHTML = `
            <td>${job.jobId}</td>
            <td>${job.name}</td>
            <td>${job.energyAffected}</td>
            <td>${job.stressAffected}</td>
            <td>${job.salary}</td>
            <td>${job.contractPeriod}</td>
            <td>${job.expMultiple}</td>
            <td><button class="btn-delete" data-id="${job.jobId}">🗑️</button></td>
            <td><button class="btn-update" data-id="${job.jobId}">✏️</button></td>
          `
          tableBody.appendChild(row)
        })
      }

      document
        .getElementById('formJob')
        .addEventListener('submit', async function (e) {
          e.preventDefault()
          const rows = document.querySelectorAll('#jobTable tr')
          const jobs = Array.from(rows).map((row) => {
            const inputs = row.querySelectorAll('input')
            return {
              name: inputs[0].value,
              energyAffected: parseInt(inputs[1].value),
              stressAffected: parseInt(inputs[2].value),
              salary: parseInt(inputs[3].value),
              contractPeriod: parseInt(inputs[4].value),
              expMultiple: parseFloat(inputs[5].value),
            }
          })

          try {
            for (const job of jobs) {
              const res = await fetch('/admin/api/job/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(job),
              })
              if (!res.ok) throw new Error('Add failed')
            }
            await loadJobs()
          } catch (err) {
            console.error(err)
            alert(err.message)
          }
        })

      document.addEventListener('click', async function (e) {
        if (e.target.classList.contains('btn-delete')) {
          const id = e.target.getAttribute('data-id')
          if (!confirm('Delete this job?')) return
          try {
            const res = await fetch(`/admin/api/job/delete/${id}`, {
              method: 'DELETE',
            })
            if (!res.ok) throw new Error('Delete failed')
            await loadJobs()
          } catch (err) {
            console.error(err)
            alert(err.message)
          }
        }

        if (e.target.classList.contains('btn-update')) {
          const row = e.target.closest('tr')
          openModal({
            jobId: e.target.getAttribute('data-id'),
            name: row.children[1].innerText,
            energyAffected: row.children[2].innerText,
            stressAffected: row.children[3].innerText,
            salary: row.children[4].innerText,
            contractPeriod: row.children[5].innerText,
            expMultiple: row.children[6].innerText,
          })
        }
      })

      function openModal(job) {
        document.getElementById('updateJobId').value = job.jobId
        document.getElementById('updateName').value = job.name
        document.getElementById('updateEnergy').value = job.energyAffected
        document.getElementById('updateStress').value = job.stressAffected
        document.getElementById('updateSalary').value = job.salary
        document.getElementById('updateContract').value = job.contractPeriod
        document.getElementById('updateExp').value = job.expMultiple
        document.getElementById('updateModal').style.display = 'block'
      }

      function closeModal() {
        document.getElementById('updateModal').style.display = 'none'
      }

      document
        .getElementById('updateForm')
        .addEventListener('submit', async function (e) {
          e.preventDefault()
          const job = {
            jobId: document.getElementById('updateJobId').value,
            name: document.getElementById('updateName').value,
            energyAffected: parseInt(
              document.getElementById('updateEnergy').value
            ),
            stressAffected: parseInt(
              document.getElementById('updateStress').value
            ),
            salary: parseInt(document.getElementById('updateSalary').value),
            contractPeriod: parseInt(
              document.getElementById('updateContract').value
            ),
            expMultiple: parseFloat(document.getElementById('updateExp').value),
          }

          try {
            const res = await fetch(`/admin/api/job/update/${job.jobId}`, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(job),
            })
            if (!res.ok) throw new Error('Update failed')
            await loadJobs()
            closeModal()
          } catch (err) {
            console.error(err)
            alert(err.message)
          }
        })

      window.addEventListener('DOMContentLoaded', () => {
        loadJobs()
      })
    </script>
  </body>
</html>
