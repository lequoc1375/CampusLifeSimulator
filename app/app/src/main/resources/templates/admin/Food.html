<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Manage Food</title>
  <style>
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: #f5faff;
      color: #333;
      margin: 0;
      padding: 20px;
    }

    h2 {
      color: #004080;
      margin-bottom: 12px;
      border-left: 4px solid #0066cc;
      padding-left: 8px;
    }

    button {
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      letter-spacing: 0.3px;
      box-shadow: 0 4px 12px rgba(0, 200, 255, 0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0, 200, 255, 0.6);
    }

    input[type="number"],
    input[type="text"],
    input[type="file"],
    input[type="submit"],
    select {
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      outline: none;
      transition: border 0.2s, box-shadow 0.2s;
    }

    input:focus,
    select:focus {
      border-color: #0066cc;
      box-shadow: 0 0 4px rgba(0, 102, 204, 0.3);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
    }

    th {
      background: #004080;
      color: #fff;
      padding: 12px;
      text-align: left;
      font-weight: 800;
      letter-spacing: 0.5px;
      font-size: 20px;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #eee;
      text-align: center;
      font-size: 18px;
    }

    .food-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
      margin-top: 20px;
    }

    .food-card {
      position: relative;
      border: 1px solid #ccc;
      border-radius: 12px;
      padding: 12px;
      text-align: center;
      background: #fff;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
      transition: transform 0.2s;
    }

    .food-card:hover {
      transform: scale(1.02);
    }

    .food-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 8px;
    }

    .food-card .delete-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: red;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 4px 6px;
      cursor: pointer;
      font-size: 12px;
    }

    .food-card .info {
      margin-top: 10px;
      text-align: left;
      font-size: 14px;
    }

    .food-card .edit-btn {
      margin-top: 10px;
      padding: 6px 12px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    #updateModal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
      z-index: 999;
      max-width: 420px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
    }

    #updateModal h3 {
      margin-top: 0;
      color: #004080;
      font-size: 20px;
      border-bottom: 2px solid #eee;
      padding-bottom: 6px;
    }

    #updateForm input,
    #updateForm select {
      width: 100%;
      margin-bottom: 12px;
      padding: 8px;
      box-sizing: border-box;
    }

    .food-tabs {
      margin-top: 20px;
      margin-bottom: 10px;
      display: flex;
      gap: 10px;
    }

    .food-tabs .tab {
      background: #e7f1ff;
      color: #004080;
      padding: 8px 14px;
      border-radius: 6px;
      border: 1px solid #bcd6ff;
      cursor: pointer;
      font-weight: 600;
    }

    .food-tabs .tab.active {
      background: #4facfe;
      color: white;
      border-color: #4facfe;
    }

    @media (max-width: 768px) {
      body {
        padding: 10px;
      }

      table {
        display: block;
        overflow-x: auto;
        white-space: nowrap;
      }

      button {
        padding: 6px 10px;
        font-size: 14px;
      }

      input,
      select {
        width: 100%;
        margin-bottom: 8px;
      }
    }

    @media (max-width: 480px) {
      h2 {
        font-size: 18px;
      }

      th,
      td {
        font-size: 14px;
        padding: 6px;
      }
    }

    .add-table-wrapper {
      max-height: 350px;
      overflow-y: auto;
      border-radius: 10px;
      background: white;
    }

    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 998;
    }
  </style>
</head>

<body>
  <h2>Number of Foods to Add:</h2>
  <input type="number" id="noOfFoods" min="1" max="10" value="1" />
  <button onclick="generateFoodForm()">Generate Food Table</button>

  <form id="formFood" enctype="multipart/form-data">
    <div class="add-table-wrapper">
      <table border="1">
        <thead>
          <tr>
            <th>Name</th>
            <th>Image</th>
            <th>Energy</th>
            <th>Stress</th>
            <th>Price</th>
            <th>Type</th>
            <th>Living Requirement</th>
          </tr>
        </thead>
        <tbody id="foodTable"></tbody>
      </table>
    </div>
    <br />
    <button type="submit">Add Food</button>
  </form>

  <h2>Food List</h2>
  <div class="food-tabs">
    <button class="tab active" data-type="all">All</button>
    <button class="tab" data-type="meal">Meal</button>
    <button class="tab" data-type="dessert">Dessert</button>
    <button class="tab" data-type="drink">Drink</button>
  </div>
  <div id="foodList" class="food-container"></div>

  <div id="updateModal">
    <h3>Update Food</h3>
    <form id="updateForm" enctype="multipart/form-data">
      <input type="hidden" id="updateFoodId" />
      <label>Name:</label><br />
      <input type="text" id="updateName" required /><br />
      <label>Image:</label><br />
      <input type="file" id="updateImage" accept="image/*" /><br />
      <label>Energy:</label><br />
      <input type="number" id="updateEnergy" required /><br />
      <label>Stress:</label><br />
      <input type="number" id="updateStress" required /><br />
      <label>Price:</label><br />
      <input type="number" step="0.01" id="updatePrice" required /><br />
      <label>Type:</label><br />
      <select id="updateType" required>
        <option value="meal">Meal</option>
        <option value="dessert">Dessert</option>
        <option value="drink">Drink</option>
      </select>
      <label>Living Requirement:</label><br />
      <select id="updateLivingRequirement" required>
        <option value="yes">yes</option>
        <option value="no">no</option>
      </select>
      <br /><br />
      <button type="submit">Save</button>
      <button type="button" onclick="closeModal()">Cancel</button>
    </form>
  </div>

  <div id="overlay"></div>

  <script>
    let allFoods = [];

    function generateFoodForm() {
      const count = parseInt(document.getElementById("noOfFoods").value);
      const table = document.getElementById("foodTable");
      table.innerHTML = "";
      for (let i = 0; i < count; i++) {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td><input type="text" name="name" required /></td>
          <td><input type="file" name="image" accept="image/*" /></td>
          <td><input type="number" name="energyAffected" required /></td>
          <td><input type="number" name="stressAffected" required /></td>
          <td><input type="number" step="0.01" name="price" required /></td>
          <td>
            <select name="type" required>
              <option value="meal">Meal</option>
              <option value="dessert">Dessert</option>
              <option value="drink">Drink</option>
            </select>
          </td>
          <td>
            <select name="livingRequirement" required>
              <option value="yes">yes</option>
              <option value="no">no</option>
            </select>
          </td>
        `;
        table.appendChild(row);
      }
    }

    async function loadFoods(filter = "all") {
      const res = await fetch("/admin/api/food");
      allFoods = await res.json();
      renderFoods(filter);
    }

    function renderFoods(filter) {
      const list = document.getElementById("foodList");
      list.innerHTML = "";
      const foods = filter === "all"
        ? allFoods
        : allFoods.filter(f => f.type.toLowerCase() === filter.toLowerCase());
      foods.forEach(food => {
        const card = document.createElement("div");
        card.className = "food-card";
        card.innerHTML = `
          <button class="delete-btn" data-id="${food.foodId}">Delete</button>
          <img src="${food.imageUrl || ""}" alt="${food.name}" />
          <div class="info">
            <p><strong>Name:</strong> ${food.name}</p>
            <p><strong>Energy:</strong> ${food.energyAffected}</p>
            <p><strong>Stress:</strong> ${food.stressAffected}</p>
            <p><strong>Price:</strong> ${food.price}</p>
            <p><strong>Type:</strong> ${food.type}</p>
            <p><strong>Living Requirement:</strong> ${food.livingRequirement}</p>
          </div>
          <button class="edit-btn" data-id="${food.foodId}">Edit</button>
        `;
        list.appendChild(card);
      });
    }

    document.getElementById("formFood").addEventListener("submit", async e => {
      e.preventDefault();
      const addButton = document.querySelector("#formFood button[type='submit']");
      addButton.disabled = true;
      addButton.textContent = "Adding...";
      const rows = document.querySelectorAll("#foodTable tr");
      for (const row of rows) {
        const inputs = row.querySelectorAll("input, select");
        const formData = new FormData();
        formData.append("name", inputs[0].value);
        if (inputs[1].files.length > 0) formData.append("image", inputs[1].files[0]);
        formData.append("energyAffected", inputs[2].value);
        formData.append("stressAffected", inputs[3].value);
        formData.append("price", inputs[4].value);
        formData.append("type", inputs[5].value);
        formData.append("livingRequirement", inputs[6].value);

        await fetch("/admin/api/food", { method: "POST", body: formData });
      }
      await loadFoods(document.querySelector(".food-tabs .tab.active").dataset.type);
      document.getElementById("formFood").reset();
      addButton.disabled = false;
      addButton.textContent = "Add Food";
    });

    function openModal() {
      document.getElementById("updateModal").style.display = "block";
      document.getElementById("overlay").style.display = "block";
    }

    function closeModal() {
      document.getElementById("updateModal").style.display = "none";
      document.getElementById("overlay").style.display = "none";
    }

    document.addEventListener("click", async e => {
      if (e.target.classList.contains("delete-btn")) {
        const id = e.target.dataset.id;
        if (!confirm("Delete this food?")) return;
        await fetch(`/admin/api/food/${id}`, { method: "DELETE" });
        await loadFoods(document.querySelector(".food-tabs .tab.active").dataset.type);
      }

      if (e.target.classList.contains("edit-btn")) {
        const id = e.target.dataset.id;
        const res = await fetch(`/admin/api/food/${id}`);
        const food = await res.json();
        document.getElementById("updateFoodId").value = food.foodId;
        document.getElementById("updateName").value = food.name;
        document.getElementById("updateEnergy").value = food.energyAffected;
        document.getElementById("updateStress").value = food.stressAffected;
        document.getElementById("updatePrice").value = food.price;
        document.getElementById("updateType").value = food.type;
        document.getElementById("updateLivingRequirement").value = food.livingRequirement;
        openModal();
      }

      if (e.target.classList.contains("tab")) {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        e.target.classList.add("active");
        renderFoods(e.target.dataset.type);
      }
    });

    document.getElementById("updateForm").addEventListener("submit", async e => {
      e.preventDefault();
      const id = document.getElementById("updateFoodId").value;
      const formData = new FormData();
      formData.append("name", document.getElementById("updateName").value);
      formData.append("energyAffected", document.getElementById("updateEnergy").value);
      formData.append("stressAffected", document.getElementById("updateStress").value);
      formData.append("price", document.getElementById("updatePrice").value);
      formData.append("type", document.getElementById("updateType").value);
      formData.append("livingRequirement", document.getElementById("updateLivingRequirement").value);
      const fileInput = document.getElementById("updateImage");
      if (fileInput.files.length > 0) formData.append("image", fileInput.files[0]);
      await fetch(`/admin/api/food/${id}`, { method: "PUT", body: formData });
      await loadFoods(document.querySelector(".food-tabs .tab.active").dataset.type);
      closeModal();
    });

    window.addEventListener("DOMContentLoaded", () => loadFoods());
  </script>
</body>
</html>
