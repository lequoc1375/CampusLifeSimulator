<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Manage Food</title>
  </head>
  <body>
    <h2>Number of Foods to Add:</h2>
    <input type="number" id="noOfFoods" min="1" max="10" value="1" />
    <button onclick="generateFoodForm()">Generate Food Table</button>

    <form id="formFood">
      <table border="1">
        <thead>
          <tr>
            <th>Name</th>
            <th>Energy</th>
            <th>Stress</th>
            <th>Price</th>
            <th>Type</th>
            <th>Living Requirement</th>
          </tr>
        </thead>
        <tbody id="foodTable"></tbody>
      </table>
      <br />
      <button type="submit">Add Food</button>
    </form>

    <h2>Food List</h2>
    <table border="1">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Energy</th>
          <th>Stress</th>
          <th>Price</th>
          <th>Type</th>
          <th>Living Requirement</th>
          <th>Delete</th>
          <th>Update</th>
        </tr>
      </thead>
      <tbody id="foodListTableBody"></tbody>
    </table>

    <div
      id="updateModal"
      style="
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        padding: 20px;
        border: 1px solid black;
      "
    >
      <h3>Update Food</h3>
      <form id="updateForm">
        <input type="hidden" id="updateFoodId" />
        <label>Name:</label><br />
        <input type="text" id="updateName" required /><br />
        <label>Energy Affected:</label><br />
        <input type="number" id="updateEnergy" required /><br />
        <label>Stress Affected:</label><br />
        <input type="number" id="updateStress" required /><br />
        <label>Price:</label><br />
        <input type="number" step="0.01" id="updatePrice" required /><br />
        <label>Type:</label><br />
        <input type="text" id="updateType" required /><br />
        <label>Living Requirement:</label><br />
        <select id="updateLivingRequirement" required>
          <option value="yes">yes</option>
          <option value="no">no</option></select
        ><br /><br />
        <button type="submit">Save</button>
        <button type="button" onclick="closeModal()">Cancel</button>
      </form>
    </div>

    <script>
      async function generateFoodForm() {
        const count = parseInt(document.getElementById('noOfFoods').value)
        const table = document.getElementById('foodTable')
        table.innerHTML = ''
        for (let i = 0; i < count; i++) {
          const row = document.createElement('tr')
          row.innerHTML = `
            <td><input type="text" name="name" required /></td>
            <td><input type="number" name="energyAffected" required /></td>
            <td><input type="number" name="stressAffected" required /></td>
            <td><input type="number" step="0.01" name="price" required /></td>
            <td><input type="text" name="type" required /></td>
            <td>
              <select name="livingRequirement" required>
                <option value="yes">yes</option>
                <option value="no">no</option>
              </select>
            </td>
          `
          table.appendChild(row)
        }
      }

      async function loadFoods() {
        const res = await fetch('/admin/api/food')
        const foods = await res.json()
        const tableBody = document.getElementById('foodListTableBody')
        tableBody.innerHTML = ''
        foods.forEach((food) => {
          const row = document.createElement('tr')
          row.innerHTML = `
            <td>${food.foodId}</td>
            <td>${food.name}</td>
            <td>${food.energyAffected}</td>
            <td>${food.stressAffected}</td>
            <td>${food.price}</td>
            <td>${food.type}</td>
            <td>${food.livingRequirement}</td>
            <td><button class="btn-delete" data-id="${food.foodId}">🗑️</button></td>
            <td><button class="btn-update" data-id="${food.foodId}">✏️</button></td>
          `
          tableBody.appendChild(row)
        })
      }

      document
        .getElementById('formFood')
        .addEventListener('submit', async (e) => {
          e.preventDefault()
          const rows = document.querySelectorAll('#foodTable tr')
          const foods = Array.from(rows).map((row) => {
            const inputs = row.querySelectorAll('input, select')
            return {
              name: inputs[0].value,
              energyAffected: parseInt(inputs[1].value),
              stressAffected: parseInt(inputs[2].value),
              price: parseFloat(inputs[3].value),
              type: inputs[4].value,
              livingRequirement: inputs[5].value,
            }
          })

          for (const food of foods) {
            await fetch('/admin/api/food', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(food),
            })
          }
          await loadFoods()
        })

      document.addEventListener('click', async (e) => {
        if (e.target.classList.contains('btn-delete')) {
          const id = e.target.dataset.id
          await fetch(`/admin/api/food/${id}`, { method: 'DELETE' })
          await loadFoods()
        }

        if (e.target.classList.contains('btn-update')) {
          const row = e.target.closest('tr')
          document.getElementById('updateFoodId').value =
            row.children[0].innerText
          document.getElementById('updateName').value =
            row.children[1].innerText
          document.getElementById('updateEnergy').value =
            row.children[2].innerText
          document.getElementById('updateStress').value =
            row.children[3].innerText
          document.getElementById('updatePrice').value =
            row.children[4].innerText
          document.getElementById('updateType').value =
            row.children[5].innerText
          document.getElementById('updateLivingRequirement').value =
            row.children[6].innerText
          document.getElementById('updateModal').style.display = 'block'
        }
      })

      document
        .getElementById('updateForm')
        .addEventListener('submit', async (e) => {
          e.preventDefault()
          const id = document.getElementById('updateFoodId').value
          const updated = {
            name: document.getElementById('updateName').value,
            energyAffected: parseInt(
              document.getElementById('updateEnergy').value
            ),
            stressAffected: parseInt(
              document.getElementById('updateStress').value
            ),
            price: parseFloat(document.getElementById('updatePrice').value),
            type: document.getElementById('updateType').value,
            livingRequirement: document.getElementById(
              'updateLivingRequirement'
            ).value,
          }

          await fetch(`/admin/api/food/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(updated),
          })

          closeModal()
          await loadFoods()
        })

      function closeModal() {
        document.getElementById('updateModal').style.display = 'none'
      }

      window.addEventListener('DOMContentLoaded', () => {
        loadFoods()
      })
    </script>
  </body>
</html>
