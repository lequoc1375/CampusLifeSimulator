<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>University town</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/UniversityTown.css}" />
    <link rel="stylesheet" th:href="@{/css/MenuBar.css}" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <div th:replace="fragments/MenuBar :: header"></div>

    <div class="main-container">
      <div class="left-panel">
        <div class="player-stats-wrapper">
          <div class="player-stats-container">
            <!-- Money -->
            <div class="stat money">
              <label>Money</label>
              <span class="money-value">$0</span>
            </div>

            <!-- Energy -->
            <div class="stat energy">
              <label>Energy</label>
              <div class="bar">
                <div class="fill energy-fill">0/0</div>
              </div>
            </div>

            <!-- Stress -->
            <div class="stat stress">
              <label>Stress</label>
              <div class="bar">
                <div class="fill stress-fill">0/0</div>
              </div>
            </div>

            <hr class="divider" />

            <!-- GPA -->
            <div class="stat gpa">
              <p class="credits">Number of Credits: N/A</p>
              <p class="gpa-value">Grade Point Average: N/A</p>
            </div>

            <button class="view-details">View Details</button>
          </div>
        </div>

        <div class="calendar-wrapper">
          <div class="calendar-container">
            <div class="calendar-header">
              <button id="prev-month" class="nav-btn">‹</button>
              <span id="month-name">Month</span>
              <span id="year">Year</span>
              <button id="next-month" class="nav-btn">›</button>
            </div>
            <div class="calendar-grid" id="calendar-grid">
              <div class="day-label">Mon</div>
              <div class="day-label">Tue</div>
              <div class="day-label">Wed</div>
              <div class="day-label">Thu</div>
              <div class="day-label">Fri</div>
              <div class="day-label">Sat</div>
              <div class="day-label">Sun</div>
            </div>
          </div>
        </div>
      </div>

      <div class="map-wrapper">
        <div class="map-container">
          <a th:href="@{/CampusLife/University}" class="map-link">
            <button class="map-button btn-university"></button>
          </a>
          <a th:href="@{/CampusLife/Gym}" class="map-link">
            <button class="map-button btn-gym"></button>
          </a>
          <a th:href="@{/CampusLife/Dorm}" class="map-link">
            <button class="map-button btn-dorm"></button>
          </a>
          <a th:href="@{/CampusLife/Mall}" class="map-link">
            <button class="map-button btn-mall"></button>
          </a>
          <a th:href="@{/CampusLife/Fair}" class="map-link">
            <button class="map-button btn-fair"></button>
          </a>
          <a th:href="@{/CampusLife/Net}" class="map-link">
            <button class="map-button btn-internet"></button>
          </a>
          <a th:href="@{/CampusLife/Food}" class="map-link">
            <button class="map-button btn-restaurant"></button>
          </a>
          <a th:href="@{/CampusLife/Work}" class="map-link">
            <button class="map-button btn-work"></button>
          </a>
        </div>
      </div>

      <div class="right-panel">
        <div class="area-description">
          <h2>University Town</h2>
          <p>Click on a location on the map to explore various areas</p>
        </div>
      </div>
    </div>
  </body>

  <script th:inline="javascript">
    let stats = []
    let stompClient = null
    const currentUserId = /*[[${user.userId}]]*/ 0

    async function loadPlayerStats() {
      try {
        const response = await fetch('/player/api/stats/me')
        if (!response.ok) throw new Error('API error')

        const stats = await response.json()
        updateUI(stats)
      } catch (error) {
        console.error('Error loading stats:', error)
      }
    }

    function updateUI(stats) {
      // Money
      document.querySelector('.money-value').innerText = `$${Number(
        stats.money
      ).toLocaleString()}`

      // Energy
      const energyPercent = (stats.currentEnergy / stats.maxEnergy) * 100
      const energyFill = document.querySelector('.energy-fill')
      energyFill.style.width = `${energyPercent}%`
      energyFill.innerText = `${stats.currentEnergy}/${stats.maxEnergy}`

      // Stress
      const stressPercent = (stats.currentStress / stats.maxStress) * 100
      const stressFill = document.querySelector('.stress-fill')
      stressFill.style.width = `${stressPercent}%`
      stressFill.innerText = `${stats.currentStress}/${stats.maxStress}`
    }

    window.addEventListener('DOMContentLoaded', () => {
      loadPlayerStats()
    })

    const monthNameEl = document.getElementById('month-name')
    const yearEl = document.getElementById('year')
    const calendarGrid = document.getElementById('calendar-grid')

    const monthNames = [
      'January',
      'February',
      'March',
      'April',
      'May',
      'June',
      'July',
      'August',
      'September',
      'October',
      'November',
      'December',
    ]

    let currentDate = new Date()

    function renderCalendar(date) {
      const year = date.getFullYear()
      const month = date.getMonth()

      monthNameEl.textContent = monthNames[month]
      yearEl.textContent = year

      while (calendarGrid.children.length > 7) {
        calendarGrid.removeChild(calendarGrid.lastChild)
      }

      const firstDay = new Date(year, month, 1).getDay()
      const startDay = (firstDay + 6) % 7
      const daysInMonth = new Date(year, month + 1, 0).getDate()

      for (let i = 0; i < startDay; i++) {
        const emptyDiv = document.createElement('div')
        calendarGrid.appendChild(emptyDiv)
      }

      const today = new Date()
      const isCurrentMonth =
        today.getFullYear() === year && today.getMonth() === month

      for (let day = 1; day <= daysInMonth; day++) {
        const dayDiv = document.createElement('div')
        dayDiv.className = 'day'
        dayDiv.textContent = day

        if (isCurrentMonth && day === today.getDate()) {
          dayDiv.classList.add('today')
        }

        calendarGrid.appendChild(dayDiv)
      }
    }

    document.getElementById('prev-month').addEventListener('click', () => {
      currentDate.setMonth(currentDate.getMonth() - 1)
      renderCalendar(currentDate)
    })

    document.getElementById('next-month').addEventListener('click', () => {
      currentDate.setMonth(currentDate.getMonth() + 1)
      renderCalendar(currentDate)
    })

    renderCalendar(currentDate)
  </script>
  <script>
    const areaData = {
      '/CampusLife/Gym': {
        title: 'Gym',
        desc: 'The gym helps you improve your max energy but need to pay to join in',
      },
      '/CampusLife/Dorm': {
        title: 'Dorm',
        desc: 'Your dorm is where you live, you can decorate your room',
      },
      '/CampusLife/Mall': {
        title: 'Mall',
        desc: 'The mall is where you can buy clothes',
      },
      '/CampusLife/Net': {
        title: 'Internet Café',
        desc: 'The internet café is great for entertainment but may increase stress.',
      },
      '/CampusLife/Fair': {
        title: 'Campus Fair',
        desc: 'The campus fair offers social activities and fun.',
      },
      '/CampusLife/Food': {
        title: 'Restaurant',
        desc: 'Grab a meal at the restaurant to restore energy.',
      },
      '/CampusLife/Work': {
        title: 'Part-time Work',
        desc: 'Part-time work helps earn money but can reduce energy.',
      },
      '/CampusLife/University': {
        title: 'University',
        desc: 'Attend classes and learn something interesting.',
      },
    }

    const defaultTitle = 'University Town!'
    const defaultDesc =
      'Click on a location on the map to explore various areas such as dorms, gym, internet cafe, and more.'

    const titleEl = document.querySelector('.area-description h2')
    const descEl = document.querySelector('.area-description p')

    document.querySelectorAll('.map-link').forEach((link) => {
      const button = link.querySelector('.map-button')
      if (button) {
        button.addEventListener('mouseenter', () => {
          const url = new URL(link.href).pathname
          const area = areaData[url]
          if (area) {
            titleEl.textContent = area.title
            descEl.textContent = area.desc
          }
        })
        button.addEventListener('mouseleave', () => {
          titleEl.textContent = defaultTitle
          descEl.textContent = defaultDesc
        })
      }
    })
  </script>
</html>
