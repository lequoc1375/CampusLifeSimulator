<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Student Gym</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />

    <link rel="stylesheet" th:href="@{/css/StatsAndCalender.css}"/>
    <link rel="stylesheet" th:href="@{/css/MenuBar.css}" />
    <link rel="stylesheet" th:href="@{/css/GymPage.css}" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
</head>

<body>

<div th:replace="fragments/MenuBar :: header"></div>

<div class="main-container">

    <!-- LEFT PANEL -->
    <div class="left-panel">
        <div class="player-stats-wrapper">
            <div class="player-stats-container">

                <div class="stat money">
                    <label>Money</label>
                    <span class="money-value">$0</span>
                </div>

                <div class="stat energy">
                    <label>Energy</label>
                    <div class="bar"><div class="fill energy-fill">0/0</div></div>
                </div>

                <div class="stat stress">
                    <label>Stress</label>
                    <div class="bar"><div class="fill stress-fill">0/0</div></div>
                </div>

                <hr class="divider"/>

                <div class="stat gpa">
                    <p class="credits">Number of Credits: N/A</p>
                    <p class="gpa-value">Grade Point Average: N/A</p>
                </div>

                <button class="view-details">View Details</button>
            </div>
        </div>

        <div class="calendar-wrapper">
            <div class="calendar-container">
                <div class="calendar-header">
                    <button id="prev-month" class="nav-btn">‹</button>
                    <span id="month-name">Month</span>
                    <span id="year">Year</span>
                    <button id="next-month" class="nav-btn">›</button>
                </div>

                <div class="calendar-grid" id="calendar-grid">
                    <div class="day-label">Mon</div>
                    <div class="day-label">Tue</div>
                    <div class="day-label">Wed</div>
                    <div class="day-label">Thu</div>
                    <div class="day-label">Fri</div>
                    <div class="day-label">Sat</div>
                    <div class="day-label">Sun</div>
                </div>
            </div>
        </div>
    </div>

    <div class="right-panel">
        <div class="gym-container">

            <h2 class="title">STUDENT GYM</h2>

            <div class="gym-header">
                <div class="gym-level">Level <span id="gym-level">1</span></div>

                <div class="gym-exp-bar">
                    <div class="gym-exp-fill" id="gym-exp-fill">0 / 100</div>
                </div>
            </div>

            <div class="gym-grid" id="gym-items"></div>

            <div id="gym-lock-overlay" class="gym-lock">
                <div class="lock-msg">
                    <p>You need a gym package to access training.</p>
                    <button onclick="openPackageModal()">Buy Package</button>
                </div>
            </div>

            <div id="package-modal" class="modal">
                <div class="modal-content">
                    <h2>Select Gym Package</h2>

                    <div id="package-list" class="package-list"></div>

                    <button class="close-modal" onclick="closePackageModal()">Close</button>
                </div>
            </div>

        </div>
    </div>

</div>
<script th:inline="javascript">
let stats = [];
    let stompClient = null;
    const currentUserId = 0;

    async function loadPlayerStats() {
      try {
        const response = await fetch("/player/api/stats/getByUser/[[${#authentication.principal.userId}]]");
        if (!response.ok) throw new Error("API error");

        const stats = await response.json();
        updateUI(stats);
      } catch (error) {
        console.error("Error loading stats:", error);
      }
    }

    function updateUI(stats) {
      // Money
      document.querySelector('.money-value').innerText = `$${Number(stats.money).toLocaleString()}`;

      // Energy
      const energyPercent = (stats.currentEnergy / stats.maxEnergy) * 100;
      const energyFill = document.querySelector('.energy-fill');
      energyFill.style.width = `${energyPercent}%`;
      energyFill.innerText = `${stats.currentEnergy}/${stats.maxEnergy}`;

      // Stress
      const stressPercent = (stats.currentStress / stats.maxStress) * 100;
      const stressFill = document.querySelector('.stress-fill');
      stressFill.style.width = `${stressPercent}%`;
      stressFill.innerText = `${stats.currentStress}/${stats.maxStress}`;
    }

    const monthNameEl = document.getElementById("month-name");
    const yearEl = document.getElementById("year");
    const calendarGrid = document.getElementById("calendar-grid");

    const monthNames = [
      "January", "February", "March", "April", "May", "June",
      "July", "August", "September", "October", "November", "December"
    ];

    let currentDate = new Date();

    function renderCalendar(date) {
      const year = date.getFullYear();
      const month = date.getMonth();

      monthNameEl.textContent = monthNames[month];
      yearEl.textContent = year;

      while (calendarGrid.children.length > 7) {
        calendarGrid.removeChild(calendarGrid.lastChild);
      }

      const firstDay = new Date(year, month, 1).getDay(); 
      const startDay = (firstDay + 6) % 7; 
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      for (let i = 0; i < startDay; i++) {
        const emptyDiv = document.createElement("div");
        calendarGrid.appendChild(emptyDiv);
      }

      const today = new Date();
      const isCurrentMonth = today.getFullYear() === year && today.getMonth() === month;

      for (let day = 1; day <= daysInMonth; day++) {
        const dayDiv = document.createElement("div");
        dayDiv.className = "day";
        dayDiv.textContent = day;

        if (isCurrentMonth && day === today.getDate()) {
          dayDiv.classList.add("today");
        }

        calendarGrid.appendChild(dayDiv);
      }
    }

    document.getElementById("prev-month").addEventListener("click", () => {
      currentDate.setMonth(currentDate.getMonth() - 1);
      renderCalendar(currentDate);
    });

    document.getElementById("next-month").addEventListener("click", () => {
      currentDate.setMonth(currentDate.getMonth() + 1);
      renderCalendar(currentDate);
    });

    renderCalendar(currentDate);

async function checkGymPackage() {
    const res = await fetch("/player/api/gym/subscription");
    const data = await res.json();

    if (!data.hasPackage) {
        document.getElementById("gym-lock-overlay").style.display = "flex";
    } else {
        document.getElementById("gym-lock-overlay").style.display = "none";
        loadGymProgress();
        loadGymExercises();
    }
}

async function loadGymProgress() {
    const res = await fetch("/player/api/gym/progress");
    const p = await res.json();

    document.getElementById("gym-level").innerText = p.level;

    const percent = (p.exp / p.expToNextLv) * 100;
    const bar = document.getElementById("gym-exp-fill");

    bar.style.width = `${percent}%`;
    bar.innerText = `${p.exp} / ${p.expToNextLv}`;
}



async function loadGymExercises() {
    const res1 = await fetch("/player/api/gym/exercise");
    const res2 = await fetch("/player/api/gym/progress");

    const exercises = await res1.json();
    const progress = await res2.json();

    renderGym(exercises, progress.level);
}

function renderGym(list, playerLevel) {
    const grid = document.getElementById("gym-items");
    grid.innerHTML = "";

    list.sort((a, b) => a.minLevel - b.minLevel);

    list.forEach(ex => {
        const card = document.createElement("div");
        const locked = playerLevel < ex.minLevel;

        card.className = "gym-card";
        card.innerHTML = `
            <img src="${ex.imageUrl}" class="gym-img">

            <div class="gym-info">
                <p class="gym-name">${ex.name}</p>

                ${locked ? 
                    `<p class="req-level">Required Level: <b>LV ${ex.minLevel}</b></p>` 
                    : `<p class="req-level available">LV ${ex.minLevel}+</p>`
                }

                <div class="gym-bottom">
                    <div class="stats">
                        <p>-${ex.energyCost} energy</p>
                        <p>+${ex.expReward} EXP</p>
                    </div>

                    ${locked ? 
                        `<button class="price-btn disabled">Locked</button>` : 
                        `<button class="price-btn train-btn" data-id="${ex.gymExerciseId}">
                            Train
                        </button>`
                    }
                </div>
            </div>
        `;

        grid.appendChild(card);
    });

    document.querySelectorAll(".train-btn").forEach(btn => {
        btn.addEventListener("click", () => train(btn.dataset.id));
    });
}

async function train(id) {
    const res = await fetch(`/player/api/gym/train/${id}`, { method: "POST" });
    const data = await res.json();

    if (!res.ok) {
        alert(data.message || "Cannot train");
        return;
    }

    updateStatsAfterTrain(data);
    updateGymProgressAfterTrain(data);

    if (data.levelUp) loadGymExercises();
}

function updateStatsAfterTrain(data) {
    // energy
    const eFill = document.querySelector('.energy-fill');
    const ePercent = (data.energy / data.maxEnergy) * 100;
    eFill.style.width = `${ePercent}%`;
    eFill.innerText = `${data.energy}/${data.maxEnergy}`;

    // stress
    const sFill = document.querySelector('.stress-fill');
    const sPercent = (data.stress / data.maxStress) * 100;
    sFill.style.width = `${sPercent}%`;
    sFill.innerText = `${data.stress}/${data.maxStress}`;
}

function updateGymProgressAfterTrain(data) {
    const bar = document.getElementById("gym-exp-fill");
    const percent = (data.currentExp / data.expToNextLv) * 100;

    bar.style.width = `${percent}%`;
    bar.innerText = `${data.currentExp} / ${data.expToNextLv}`;

    document.getElementById("gym-level").innerText = data.newLevel;
}

function openPackageModal() {
    loadPackages();
    document.getElementById("package-modal").style.display = "flex";
}

function closePackageModal() {
    document.getElementById("package-modal").style.display = "none";
}

// Load all gym packages
async function loadPackages() {
    const container = document.getElementById("package-list");
    container.innerHTML = "<p>Loading...</p>";

    const res = await fetch("/player/api/gym/packages");
    const list = await res.json();

    container.innerHTML = "";

    list.forEach(p => {
        const card = document.createElement("div");
        card.className = "package-card";

        card.innerHTML = `
            <h3>${p.packageName}</h3>
            <p>Duration: <b>${p.durationDays} days</b></p>
            <p>Price: <b>$${Number(p.price).toLocaleString()}</b></p>

            <button class="buy-btn2" onclick="buyGymPackage(${p.gymPackageId})">
                Buy Package
            </button>
        `;

        container.appendChild(card);
    });
}

// Mua gói
async function buyGymPackage(packageId) {
    const res = await fetch(`/player/api/gym/buyPackage/${packageId}`, {
        method: "POST"
    });

    const data = await res.json();

    if (!res.ok) {
        alert(data.error || "Purchase failed");
        return;
    }

    // Update money UI
    document.querySelector('.money-value').innerText = `$${data.money}`;

    closePackageModal();
    checkGymPackage(); // reload gym lock
}


window.addEventListener("DOMContentLoaded", () => {
    loadPlayerStats();
    checkGymPackage();
    renderCalendar(currentDate);
});

</script>

</body>
