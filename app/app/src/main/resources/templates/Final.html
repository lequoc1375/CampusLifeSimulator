<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Final Quizzes</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/RegisterSubjects.css}" />
    <link rel="stylesheet" th:href="@{/css/StatsAndCalender.css}" />
    <link rel="stylesheet" th:href="@{/css/MenuBar.css}" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      .subjects-section {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .course-list {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .course-card {
        display: flex;
        flex-direction: row;
        border-radius: 12px;
        background: #fff;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
        overflow: hidden;
        width: 800px;
      }
      .card-left {
        width: 260px;
        display: flex;
        flex-direction: column;
        border-right: 1px solid #eee;
      }
      .card-left-top {
        padding: 16px;
        background: #04901e;
        color: #fff;
      }
      .card-left-top h2 {
        font-size: 20px;
        margin: 0 0 8px 0;
      }
      .card-left-top .subtitle {
        font-size: 14px;
        opacity: 0.9;
      }
      .card-left-bottom {
        padding: 12px 10px;
        background: #fff;
        color: #333;
        display: flex;
        flex-direction: column;
        gap: 24px;
        font-size: 14px;
      }
      .card-left-bottom .progress-text {
        font-weight: bold;
        color: #000;
        font-size: 14px;
        margin: 0 0 25px 0;
      }
      .card-left-bottom .card-footer {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        opacity: 0.9;
      }
      .card-right {
        flex: 1;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-height: 300px;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: #888 #f1f1f1;
      }
      .card-right::-webkit-scrollbar {
        width: 8px;
      }
      .card-right::-webkit-scrollbar-track {
        background: #f1f1f1;
        border-radius: 10px;
      }
      .card-right::-webkit-scrollbar-thumb {
        background: #888;
        border-radius: 10px;
      }
      .card-right::-webkit-scrollbar-thumb:hover {
        background: #555;
      }
      .final {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #f7f7f7;
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 14px;
        color: #555;
      }
      .final.active {
        font-weight: bold;
        background: #e6f7ff;
        color: #000;
      }
      .play-btn {
        border: 1px solid #ccc;
        border-radius: 50%;
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        background: #fff;
        cursor: pointer;
        text-decoration: none;
        color: #333;
      }
      .play-btn.disabled {
        cursor: not-allowed;
        opacity: 0.6;
        pointer-events: none;
      }
      .no-finals {
        font-style: italic;
        color: #777;
        padding: 10px 12px;
        font-size: 14px;
      }
      .card-left-bottom h3 {
        font-size: 35px;
        margin: 0 0 -24px 0;
      }
      @media (max-width: 850px) {
        .course-card {
          width: 100%;
          max-width: 600px;
        }
        .card-left {
          width: 200px;
        }
      }
    </style>
  </head>
  <body>
    <div th:replace="fragments/MenuBar :: header"></div>

    <div class="main-container">
      <div class="left-panel">
        <div class="player-stats-wrapper">
          <div class="player-stats-container">
            <div class="stat money">
              <label>Money</label>
              <span class="money-value">$0</span>
            </div>

            <div class="stat energy">
              <label>Energy</label>
              <div class="bar">
                <div class="fill energy-fill">0/0</div>
              </div>
            </div>

            <div class="stat stress">
              <label>Stress</label>
              <div class="bar">
                <div class="fill stress-fill">0/0</div>
              </div>
            </div>

            <hr class="divider" />

            <div class="stat gpa">
              <p class="credits">Number of Credits: N/A</p>
              <p class="gpa-value">Grade Point Average: N/A</p>
            </div>

            <button class="view-details">View Details</button>
          </div>
        </div>

        <div class="calendar-wrapper">
          <div class="calendar-container">
            <div class="calendar-header">
              <button id="prev-month" class="nav-btn">‹</button>
              <span id="month-name">Month</span>
              <span id="year">Year</span>
              <button id="next-month" class="nav-btn">›</button>
            </div>
            <div class="calendar-grid" id="calendar-grid">
              <div class="day-label">Mon</div>
              <div class="day-label">Tue</div>
              <div class="day-label">Wed</div>
              <div class="day-label">Thu</div>
              <div class="day-label">Fri</div>
              <div class="day-label">Sat</div>
              <div class="day-label">Sun</div>
            </div>
          </div>
        </div>
      </div>

      <div class="right-panel">
        <input
          class="search-bar"
          placeholder="Search for courses"
          oninput="filterCourses(this.value)"
        />
        <div class="subjects-section" id="final-section"></div>
      </div>
    </div>

    <script th:inline="javascript">
      let userCurriculumId

      async function loadPlayerStats() {
        try {
          const response = await fetch(
            '/player/api/stats/getByUser/[[${#authentication.principal.userId}]]'
          )
          if (!response.ok) throw new Error('API error')
          const stats = await response.json()
          userCurriculumId = stats.user.userCurriculum.userCurriculumId
          updateUI(stats)
        } catch (error) {
          console.error('Error loading stats:', error)
        }
      }

      function updateUI(stats) {
        document.querySelector('.money-value').innerText = `$${Number(
          stats.money
        ).toLocaleString()}`
        const energyPercent = (stats.currentEnergy / stats.maxEnergy) * 100
        const energyFill = document.querySelector('.energy-fill')
        energyFill.style.width = `${energyPercent}%`
        energyFill.innerText = `${stats.currentEnergy}/${stats.maxEnergy}`
        const stressPercent = (stats.currentStress / stats.maxStress) * 100
        const stressFill = document.querySelector('.stress-fill')
        stressFill.style.width = `${stressPercent}%`
        stressFill.innerText = `${stats.currentStress}/${stats.maxStress}`
      }

      async function loadFinalQuiz() {
        try {
          const res = await fetch(
            '/player/api/course/list/[[${#authentication.principal.userId}]]'
          )
          if (!res.ok) throw new Error(`HTTP error! Status: ${res.status}`)
          const data = await res.json()
          renderCourses(data.inProgress)
        } catch (error) {
          console.error('Failed to load courses:', error)
          document.getElementById('final-section').innerHTML =
            '<p>Error loading final quizzes.</p>'
        }
      }

      async function renderCourses(courses) {
        const container = document.getElementById('final-section')
        container.innerHTML = ''
        const categoryEl = document.createElement('div')
        categoryEl.classList.add('course-category')
        const titleEl = document.createElement('h3')
        titleEl.textContent = 'In Progress'
        categoryEl.appendChild(titleEl)
        const listEl = document.createElement('div')
        listEl.classList.add('course-list')

        for (const course of courses) {
          const card = document.createElement('div')
          card.classList.add('course-card')

          const left = document.createElement('div')
          left.classList.add('card-left')

          const top = document.createElement('div')
          top.classList.add('card-left-top')

          const title = document.createElement('h2')
          title.textContent = course.name

          const subtitle = document.createElement('p')
          subtitle.classList.add('subtitle')
          subtitle.textContent = 'Only for IU students'

          top.appendChild(title)
          top.appendChild(subtitle)

          const bottom = document.createElement('div')
          bottom.classList.add('card-left-bottom')

          const bottomTitle = document.createElement('h3')
          bottomTitle.textContent = course.name
          bottom.appendChild(bottomTitle)

          left.appendChild(top)
          left.appendChild(bottom)

          const right = document.createElement('div')
          right.classList.add('card-right')

          const finals = course.finalExams || []
          if (finals.length === 0) {
            const noFinal = document.createElement('div')
            noFinal.classList.add('no-finals')
            noFinal.textContent = 'No finals available.'
            right.appendChild(noFinal)
          } else {
            const final = await fetchRandomFinal(
              course.subject_id,
              userCurriculumId
            )

            const finalDiv = document.createElement('div')
            finalDiv.classList.add('final', 'active')
            finalDiv.dataset.finalId = final.finalId
            finalDiv.dataset.subjectId = course.subject_id

            const finalText = document.createElement('span')
            finalText.textContent = `Final ${final.finalId}, ${final.time} minutes, ${final.problems.length} problem(s)`

            const btn = document.createElement('a')
            btn.classList.add('play-btn')

            await updateFinalButton(finalDiv, btn)
            // try {
            //   const result = await fetch(
            //     `/player/api/final/check/${final.finalId}/${userCurriculumId}/${course.subject_id}`
            //   )

            //   if (!result.ok)
            //     throw new error(
            //       'Error in fetching player/api/final/check/${final.finalId}/${userCurriculumId}'
            //     )
            //   const response = await result.json()
            //   if (response.status === 'able') {
            //     btn.href = `/final/${final.finalId}/${userCurriculumId}/${course.subject_id}`
            //     btn.textContent = '▶'
            //     btn.title = 'Start Final'
            //   } else if (response.status === 'unable') {
            //     finalDiv.classList.add('disabled')
            //     btn.textContent = '🔒'
            //     btn.style.opacity = '0.3'
            //     btn.style.cursor = 'not-allowed'
            //   }
            // } catch (error) {}

            finalDiv.appendChild(finalText)
            finalDiv.appendChild(btn)
            right.appendChild(finalDiv)
          }

          card.appendChild(left)
          card.appendChild(right)
          listEl.appendChild(card)
        }

        categoryEl.appendChild(listEl)
        container.appendChild(categoryEl)
      }

      async function updateFinalButton(finalDiv, btn) {
        const finalId = finalDiv.dataset.finalId
        const subjectId = finalDiv.dataset.subjectId
        try {
          const result = await fetch(
            `/player/api/final/check/${finalId}/${userCurriculumId}/${subjectId}`
          )
          if (!result.ok) throw new Error('API error')
          const response = await result.json()

          if (response.status === 'able') {
            btn.href = `/final/${finalId}/${userCurriculumId}/${subjectId}`
            btn.textContent = '▶'
            btn.title = 'Start Final'
            finalDiv.classList.remove('disabled')
            btn.style.opacity = '1'
            btn.style.cursor = 'pointer'
          } else {
            finalDiv.classList.add('disabled')
            btn.textContent = '🔒'
            btn.style.opacity = '0.3'
            btn.style.cursor = 'not-allowed'
            btn.removeAttribute('href')
          }
        } catch (error) {
          console.error('Error updating final button', error)
        }
      }

      async function updateAllFinalButtons() {
        const cards = document.querySelectorAll('.final')
        for (const card of cards) {
          const btn = card.querySelector('.play-btn')
          await updateFinalButton(card, btn)
        }
      }

      function filterCourses(query) {
        query = query.toLowerCase().trim()
        document.querySelectorAll('.course-card').forEach((card) => {
          const title = card
            .querySelector('.card-left-top h2')
            .textContent.toLowerCase()
          card.style.display = title.includes(query) ? '' : 'none'
        })
      }

      window.addEventListener('DOMContentLoaded', () => {
        loadPlayerStats()
        loadFinalQuiz()
        renderCalendar(new Date())
        setInterval(() => {
          updateAllFinalButtons()
        }, 5000)
      })

      const monthNameEl = document.getElementById('month-name')
      const yearEl = document.getElementById('year')
      const calendarGrid = document.getElementById('calendar-grid')
      const monthNames = [
        'January',
        'February',
        'March',
        'April',
        'May',
        'June',
        'July',
        'August',
        'September',
        'October',
        'November',
        'December',
      ]

      function renderCalendar(date) {
        const year = date.getFullYear()
        const month = date.getMonth()
        monthNameEl.textContent = monthNames[month]
        yearEl.textContent = year
        while (calendarGrid.children.length > 7) {
          calendarGrid.removeChild(calendarGrid.lastChild)
        }
        const firstDay = new Date(year, month, 1).getDay()
        const startDay = (firstDay + 6) % 7
        const daysInMonth = new Date(year, month + 1, 0).getDate()
        for (let i = 0; i < startDay; i++) {
          const emptyDiv = document.createElement('div')
          calendarGrid.appendChild(emptyDiv)
        }
        const today = new Date()
        const isCurrentMonth =
          today.getFullYear() === year && today.getMonth() === month
        for (let day = 1; day <= daysInMonth; day++) {
          const dayDiv = document.createElement('div')
          dayDiv.className = 'day'
          dayDiv.textContent = day
          if (isCurrentMonth && day === today.getDate()) {
            dayDiv.classList.add('today')
          }
          calendarGrid.appendChild(dayDiv)
        }
      }

      document.getElementById('prev-month').addEventListener('click', () => {
        currentDate.setMonth(currentDate.getMonth() - 1)
        renderCalendar(currentDate)
      })

      document.getElementById('next-month').addEventListener('click', () => {
        currentDate.setMonth(currentDate.getMonth() + 1)
        renderCalendar(currentDate)
      })

      let currentDate = new Date()

      async function fetchRandomFinal(courseId, userCurriculumId) {
        const res = await fetch(
          `/player/api/final/random/${courseId}/${userCurriculumId}`
        )
        if (!res.ok) return null
        return await res.json()
      }
    </script>
  </body>
</html>
