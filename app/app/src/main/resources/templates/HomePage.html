<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Student Game Navigation</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link rel="stylesheet" th:href="@{/css/HomePage.css}" />
  <link rel="stylesheet" th:href="@{/css/StatsAndCalender.css}"/>
  <link rel="stylesheet" th:href="@{/css/MenuBar.css}" />
</head>
<body>
  <div th:replace="fragments/MenuBar :: header"></div>

  <div class="container">
    <div class="left-panel">
      <div class="player-stats-wrapper">
        <div class="player-stats-container">
          <!-- Money -->
          <div class="stat money">
            <label>Money</label>
            <span class="money-value">$0</span>
          </div>

          <!-- Energy -->
          <div class="stat energy">
            <label>Energy</label>
            <div class="bar">
              <div class="fill energy-fill">0/0</div>
            </div>
          </div>

          <!-- Stress -->
          <div class="stat stress">
            <label>Stress</label>
            <div class="bar">
              <div class="fill stress-fill">0/0</div>
            </div>
          </div>

          <hr class="divider" />

          <!-- GPA -->
          <div class="stat gpa">
            <p class="credits">Number of Credits: N/A</p>
            <p class="gpa-value">Grade Point Average: N/A</p>
          </div>

          <button class="view-details">View Details</button>
        </div>
      </div>

      <div class="calendar-wrapper">
        <div class="calendar-container">
          <div class="calendar-header">
            <button id="prev-month" class="nav-btn">‹</button>
            <span id="month-name">Month</span>
            <span id="year">Year</span>
            <button id="next-month" class="nav-btn">›</button>
          </div>
          <div class="calendar-grid" id="calendar-grid">
            <div class="day-label">Mon</div>
            <div class="day-label">Tue</div>
            <div class="day-label">Wed</div>
            <div class="day-label">Thu</div>
            <div class="day-label">Fri</div>
            <div class="day-label">Sat</div>
            <div class="day-label">Sun</div>
          </div>
        </div>
      </div>
    </div>

    <div class="avatar-section">
      <div class="avatar-box"></div>
      <a th:href="@{/change-cloth}">
        <button class="change-cloth">Change Clothes</button>
      </a>
    </div>

    <div class="right-panel">
      <div class="friend-list">

        <!-- Tabs -->
        <div class="friend-list-tabs">
          <button id="btnFriendList" onclick="showFriendList()" class="active-tab">Friends</button>
          <button id="btnRequestList" onclick="showRequestList()">
            Find Friend <span id="requestIndicator" style="color: red; display: none;">●</span>
          </button>
        </div>

        <!-- Friend List Tab -->
        <div id="friendListContainer" class="tab-content">
          <ul id="friendList"></ul>
        </div>

        <!-- Request Tab -->
        <div id="requestListContainer" class="tab-content" style="display: none;">

          <!-- Find Friend -->
          <div class="add-friend-form">
            <h4>Find Friend</h4>
            <div class="input-group">
              <input id="friendIdInput" placeholder="Enter friend's username" />
              <button onclick="previewFriendName()">Search</button>
            </div>
            <div id="previewFriendInfo" style="margin-top: 10px;"></div>
            <p id="friendRequestStatus"></p>
          </div>

          <!-- Incoming Requests -->
          <div class="pending-request-list">
            <h4>Incoming Requests</h4>
            <ul id="pendingRequestsContainer"></ul>
          </div>

        </div>
      </div>
    </div>
  </div>

  <div id="chatBoxContainer" style="position: fixed; bottom: 0; right: 20px; display: none; z-index: 9999;"></div>

  <!-- WebSocket libraries -->
  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

  <script th:inline="javascript">
    let stats = [];
    let stompClient = null;
    const currentUserId = /*[[${user.userId}]]*/ 0;

    async function loadPlayerStats() {
      try {
        const response = await fetch("/player/api/stats/getByUser/[[${#authentication.principal.userId}]]");
        if (!response.ok) throw new Error("API error");

        const stats = await response.json();
        updateUI(stats);
      } catch (error) {
        console.error("Error loading stats:", error);
      }
    }

    function updateUI(stats) {
      // Money
      document.querySelector('.money-value').innerText = `$${Number(stats.money).toLocaleString()}`;

      // Energy
      const energyPercent = (stats.currentEnergy / stats.maxEnergy) * 100;
      const energyFill = document.querySelector('.energy-fill');
      energyFill.style.width = `${energyPercent}%`;
      energyFill.innerText = `${stats.currentEnergy}/${stats.maxEnergy}`;

      // Stress
      const stressPercent = (stats.currentStress / stats.maxStress) * 100;
      const stressFill = document.querySelector('.stress-fill');
      stressFill.style.width = `${stressPercent}%`;
      stressFill.innerText = `${stats.currentStress}/${stats.maxStress}`;
    }

    async function previewFriendName() {
      const inputUsername = document.getElementById("friendIdInput").value.trim().toLowerCase();
      const display = document.getElementById("previewFriendInfo");
      display.innerHTML = "";

      if (!inputUsername) {
        display.innerText = "Please enter a valid username.";
        return;
      }

      display.innerText = "Loading...";

      try {
        const response = await fetch(`/player/api/friend-request/user/${inputUsername}`);
        if (!response.ok) {
          const msg = await response.text();
          display.innerText = msg;
          return;
        }

        const { userId, username, relation } = await response.json();

        if (relation === "friend") {
          display.innerHTML = `<b>${username}</b> - <span style="color: green;">Friend</span>`;
        } else if (relation === "incoming_request") {
          display.innerHTML = `
            <b>${username}</b> 
            <button onclick="acceptFriendRequestFromSearch(${userId})">Accept</button>
            <button onclick="declineFriendRequestFromSearch(${userId})">Decline</button>
          `;
        } else if (relation === "outgoing_request") {
          display.innerHTML = `<b>${username}</b> - <span style="color: gray;">Request Sent</span>`;
        } else {
          display.innerHTML = `
            <b>${username}</b> 
            <button onclick="sendFriendRequest(${userId})">Add</button>
          `;
        }
      } catch (err) {
        console.error(err);
        display.innerText = "Error fetching user info.";
      }
    }

    async function sendFriendRequest(friendId) {
      if (!friendId) {
        alert("No user selected.");
        return;
      }

      try {
        const response = await fetch("/player/api/friend-request/send", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ receiverId: parseInt(friendId) }),
        });

        if (response.ok) {
          document.getElementById("friendRequestStatus").innerText = "Friend request sent successfully.";
          document.getElementById("previewFriendInfo").innerHTML = "";
          loadSentRequests();
        } else {
          const err = await response.text();
          document.getElementById("friendRequestStatus").innerText = `${err}`;
        }
      } catch (error) {
        console.error(error);
        document.getElementById("friendRequestStatus").innerText = "Something went wrong.";
      }
    }

    function showFriendList() {
      document.getElementById("friendListContainer").style.display = "block";
      document.getElementById("requestListContainer").style.display = "none";
      document.getElementById("btnFriendList").classList.add("active-tab");
      document.getElementById("btnRequestList").classList.remove("active-tab");
    }

    function showRequestList() {
      document.getElementById("friendListContainer").style.display = "none";
      document.getElementById("requestListContainer").style.display = "block";
      document.getElementById("btnFriendList").classList.remove("active-tab");
      document.getElementById("btnRequestList").classList.add("active-tab");

      loadPendingRequests();
      loadSentRequests();
    }

    async function loadFriends() {
      const response = await fetch(`/player/api/friend-relationship/list/${currentUserId}`);
      const friends = await response.json();

      const list = document.getElementById("friendList");
      list.innerHTML = friends.map(friend => `
      <li class="friend-item">
        <div class="friend-avatar">
          <img src="/images/DefaultAvatar.png" alt="avatar" />
        </div>
        <div class="friend-info">
          <div class="friend-name">${friend.username || "User #" + friend.user_id}</div>
          <div class="friend-status">online</div>
        </div>
        <div class="friend-options">
          <button class="option-btn" onclick="toggleOptionsMenu(this)">⋯</button>
          <div class="options-menu" style="display: none;">
            <button onclick="openChatBox(${friend.user_id}, '${friend.username || "User #" + friend.user_id}')">Chat</button>
            <button onclick="removeFriend(${friend.user_id})" style="color: red;">Unfriend</button>
          </div>
        </div>
      </li>
    `).join("");
    }

    function toggleOptionsMenu(btn) {
      const menu = btn.nextElementSibling;

      document.querySelectorAll('.options-menu').forEach(m => {
        if (m !== menu) m.style.display = 'none';
      });

      menu.style.display = menu.style.display === "block" ? "none" : "block";
    }

    document.addEventListener("click", function (e) {
      if (!e.target.closest(".friend-options")) {
        document.querySelectorAll(".options-menu").forEach(menu => {
          menu.style.display = "none";
        });
      }
    });

    async function loadPendingRequests() {
      const container = document.getElementById("pendingRequestsContainer");
      try {
        const response = await fetch("/player/api/friend-request/pending");
        if (!response.ok) {
          container.innerHTML = "<li>Failed to load requests.</li>";
          return;
        }

        const requests = await response.json();
        if (requests.length === 0) {
          container.innerHTML = "<li>No pending requests.</li>";
          return;
        }

        container.innerHTML = requests.map(req => `
          <li>
            <b>${req.sender.username || "User #" + req.sender.userId}</b> sent a request
            <button onclick="acceptFriendRequest(${req.requestId})">Accept</button>
            <button onclick="declineFriendRequest(${req.requestId})">Decline</button>
          </li>
        `).join("");
      } catch (error) {
        console.error(error);
        container.innerHTML = "<li>Error while loading requests.</li>";
      }
      document.getElementById("requestIndicator").style.display = "none";
    }

    async function acceptFriendRequest(requestId) {
      try {
        const response = await fetch(`/player/api/friend-request/accept/${requestId}`, {
          method: "POST"
        });

        if (response.ok) {
          alert("Friend request accepted.");
          showRequestList();
          loadFriends();
        } else {
          alert("Failed to accept the request.");
        }
      } catch (error) {
        console.error(error);
        alert("Server error.");
      }
    }

    async function declineFriendRequest(requestId) {
      try {
        const response = await fetch(`/player/api/friend-request/decline/${requestId}`, {
          method: "POST"
        });

        if (response.ok) {
          alert("Friend request declined.");
          showRequestList();
        } else {
          alert("Failed to decline the request.");
        }
      } catch (error) {
        console.error(error);
        alert("Server error.");
      }
    }

    async function acceptFriendRequestFromSearch(senderId) {
      try {
        const res = await fetch(`/player/api/friend-request/pending`);
        const requests = await res.json();
        const request = requests.find(r => r.sender.user_id === senderId);
        if (!request) {
          alert("Request not found.");
          return;
        }
        await acceptFriendRequest(request.requestId);
        previewFriendName(); 
      } catch (err) {
        console.error(err);
        alert("Server error.");
      }
    }

    async function declineFriendRequestFromSearch(senderId) {
      try {
        const res = await fetch(`/player/api/friend-request/pending`);
        const requests = await res.json();
        const request = requests.find(r => r.sender.user_id === senderId);
        if (!request) {
          alert("Request not found.");
          return;
        }
        await declineFriendRequest(request.requestId);
        previewFriendName(); 
      } catch (err) {
        console.error(err);
        alert("Server error.");
      }
    }

    function connectWebSocket() {
      const socket = new SockJS('/ws');
      stompClient = Stomp.over(socket);

      stompClient.connect({}, function (frame) {
        console.log('WebSocket connected:', frame);

        stompClient.subscribe(`/topic/friend-request/${currentUserId}`, function (message) {
          const data = JSON.parse(message.body);
          const container = document.getElementById("pendingRequestsContainer");
          const html = `
            <li>
              <b>${data.senderUsername || "User #" + data.senderId}</b> sent a request
              <button onclick="showRequestList()">View</button>
            </li>
          `;
          container.innerHTML += html;
          document.getElementById("requestIndicator").style.display = "inline";
        });

        stompClient.subscribe(`/topic/chat/[[${user.userId}]]`, function (msg) {
        const data = JSON.parse(msg.body);

        if (data.senderId === currentUserId) return;

        const friendId = data.senderId;
        const friendName = data.senderUsername || "User #" + friendId;

        openChatBox(friendId, friendName);
        const body = document.getElementById('chat-body-' + friendId);
        const div = document.createElement('div');
        div.classList.add("their-message");
        div.innerText = friendName + ': ' + data.content;
        body.appendChild(div);
        body.scrollTop = body.scrollHeight;
      });
      });
    }

    async function removeFriend(friendId) {
      if (!confirm("Are you sure you want to unfriend this user?")) return;

      try {
        const response = await fetch(`/player/api/friend-relationship/remove/${friendId}`, {
          method: "DELETE"
        });

        if (response.ok) {
          alert("Friend removed.");
          loadFriends();
        } else {
          alert("Failed to remove friend.");
        }
      } catch (error) {
        console.error(error);
        alert("Server error.");
      }
    }

    //CHAT BOX SECTION
    let conversationMap = new Map();

    function openChatBox(friendId, friendName) {
      const existingBox = document.getElementById('chat-box-' + friendId);
      if (existingBox) {
        existingBox.style.display = 'flex';
        return;
      }

      const chatBox = document.createElement('div');
      chatBox.className = 'chat-box';
      chatBox.id = 'chat-box-' + friendId;

      chatBox.innerHTML = `
        <div class="chat-header">
          <span>${friendName}</span>
          <div>
            <button onclick="minimizeChat(${friendId})">_</button>
            <button onclick="closeChat(${friendId})">×</button>
          </div>
        </div>
        <div class="chat-body" id="chat-body-${friendId}"></div>
        <div class="chat-input">
          <input type="text" id="chat-input-${friendId}" placeholder="Type a message..." onkeydown="handleEnter(event, ${friendId})" />
          <button onclick="sendMessageToFriend(${friendId})">Send</button>
        </div>
      `;

      document.getElementById('chatBoxContainer').appendChild(chatBox);
      document.getElementById('chatBoxContainer').style.display = 'flex';

      if (!conversationMap.has(friendId)) {
        fetch(`/api/chat/conversations/${currentUserId}`)
          .then(res => res.json())
          .then(convos => {
            const match = convos.find(c =>
              c.participants.some(p => p.user.user_id === friendId)
            );
            if (match) {
              conversationMap.set(friendId, match.conversationId);
              loadMessageHistory(match.conversationId, friendId);
            }
          });
      } else {
        const conversationId = conversationMap.get(friendId);
        loadMessageHistory(conversationId, friendId);
      }
    }

    function loadMessageHistory(conversationId, friendId) {
      fetch(`/api/chat/conversations/${conversationId}/messages?receiverId=${currentUserId}`)
        .then(res => res.json())
        .then(messages => {
          const chatBody = document.getElementById('chat-body-' + friendId);
          chatBody.innerHTML = ''; 

          messages.forEach(msg => {
            const div = document.createElement('div');
            div.innerText = (msg.senderId === currentUserId ? 'You' : msg.senderUsername) + ': ' + msg.content;
            div.classList.add(msg.senderId === currentUserId ? 'my-message' : 'their-message');
            chatBody.appendChild(div);
          });

          chatBody.scrollTop = chatBody.scrollHeight;
        });
    }

    function closeChat(friendId) {
      const box = document.getElementById('chat-box-' + friendId);
      if (box) box.remove();
    }

    function minimizeChat(friendId) {
      const box = document.getElementById('chat-box-' + friendId);
      if (box) {
        const body = box.querySelector('.chat-body');
        const input = box.querySelector('.chat-input');
        const isHidden = body.style.display === 'none';

        if (isHidden) {
          body.style.display = 'block';
          input.style.display = 'flex';
          box.style.height = '400px';
        } else {
          body.style.display = 'none';
          input.style.display = 'none';
          box.style.height = '40px';
        }
      }
    }

    function handleEnter(event, friendId) {
      if (event.key === 'Enter') sendMessageToFriend(friendId);
    }

    function sendMessageToFriend(friendId) {
      const input = document.getElementById('chat-input-' + friendId);
      const content = input.value.trim();
      if (!content) return;

      fetch('/api/chat/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          senderId: currentUserId,
          receiverId: friendId,
          content: content
        })
      })
      .then(res => res.json())
      .then(data => {
        const body = document.getElementById('chat-body-' + friendId);
        const div = document.createElement('div');
        div.classList.add("my-message");
        div.innerText = 'You: ' + content;
        body.appendChild(div);
        body.scrollTop = body.scrollHeight;

        input.value = '';
      });
    }

    window.addEventListener("DOMContentLoaded", () => {
      loadPlayerStats();
      loadFriends();
      connectWebSocket();
    });


  </script>

  <script>
    const monthNameEl = document.getElementById("month-name");
    const yearEl = document.getElementById("year");
    const calendarGrid = document.getElementById("calendar-grid");

    const monthNames = [
      "January", "February", "March", "April", "May", "June",
      "July", "August", "September", "October", "November", "December"
    ];

    let currentDate = new Date();

    function renderCalendar(date) {
      const year = date.getFullYear();
      const month = date.getMonth();

      // Set header
      monthNameEl.textContent = monthNames[month];
      yearEl.textContent = year;

      // Xóa tất cả các ngày cũ (chừa lại 7 ô label đầu)
      while (calendarGrid.children.length > 7) {
        calendarGrid.removeChild(calendarGrid.lastChild);
      }

      const firstDay = new Date(year, month, 1).getDay(); // 0: Sunday
      const startDay = (firstDay + 6) % 7; // chuyển về Monday = 0
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      // Render các ô trống trước ngày 1
      for (let i = 0; i < startDay; i++) {
        const emptyDiv = document.createElement("div");
        calendarGrid.appendChild(emptyDiv);
      }

      // Render các ngày trong tháng
      const today = new Date();
      const isCurrentMonth = today.getFullYear() === year && today.getMonth() === month;

      for (let day = 1; day <= daysInMonth; day++) {
        const dayDiv = document.createElement("div");
        dayDiv.className = "day";
        dayDiv.textContent = day;

        if (isCurrentMonth && day === today.getDate()) {
          dayDiv.classList.add("today");
        }

        calendarGrid.appendChild(dayDiv);
      }
    }

    document.getElementById("prev-month").addEventListener("click", () => {
      currentDate.setMonth(currentDate.getMonth() - 1);
      renderCalendar(currentDate);
    });

    document.getElementById("next-month").addEventListener("click", () => {
      currentDate.setMonth(currentDate.getMonth() + 1);
      renderCalendar(currentDate);
    });

    // Lần đầu load
    renderCalendar(currentDate);
  </script>
</body>
</html>
